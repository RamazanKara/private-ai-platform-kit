fullnameOverride: ollama
model:
  name: qwen2.5:0.5b
  pullOnStart: true
persistence:
  enabled: true
  size: 10Gi
networkPolicy:
  allowModelPullEgress: true
  # Development-only bootstrap: Ollama's registry addresses are dynamic and
  # Kubernetes NetworkPolicy has no FQDN selector. Customer profiles may not use it.
  modelPullEgressCidrs:
    - 0.0.0.0/0
  localDevelopmentException: true
podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: local
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: local-lab
