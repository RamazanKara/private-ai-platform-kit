apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-operators
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://kyverno.github.io/kyverno/
      chart: kyverno
      targetRevision: 3.2.7
      helm:
        releaseName: kyverno
        # docker.io/bitnami/kubectl was purged from Docker Hub (Bitnami catalog
        # retirement); pin the archived mirror for the report-cleanup CronJobs.
        valuesObject:
          cleanupJobs:
            admissionReports:
              image:
                registry: docker.io
                repository: bitnamilegacy/kubectl
            clusterAdmissionReports:
              image:
                registry: docker.io
                repository: bitnamilegacy/kubectl
            ephemeralReports:
              image:
                registry: docker.io
                repository: bitnamilegacy/kubectl
            clusterEphemeralReports:
              image:
                registry: docker.io
                repository: bitnamilegacy/kubectl
          webhooksCleanup:
            image:
              registry: docker.io
              repository: bitnamilegacy/kubectl
    - repoURL: https://kedacore.github.io/charts
      chart: keda
      targetRevision: 2.16.1
      helm:
        releaseName: keda
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 0.11.0
      helm:
        releaseName: external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Kyverno and KEDA CRDs exceed the client-side last-applied annotation
      # limit on fresh clusters.
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RamazanKara/private-ai-platform-kit.git
    targetRevision: v0.27.0
    path: deploy/observability
    directory:
      # Recurse so the PrometheusRule (alerts/) and the Grafana dashboard ConfigMaps
      # (dashboards/configmap.yaml) actually deploy; the include list keeps the raw
      # dashboards/*.json sources and the OPT-IN runtime-security.yaml (Falco) out of
      # the sync, matching that file's documented opt-in contract.
      recurse: true
      include: '{applications.yaml,alerts/*.yaml,dashboards/configmap.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
