apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cost-controls
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://opencost.github.io/opencost-helm-chart
    chart: opencost
    targetRevision: 1.41.0
    helm:
      releaseName: opencost
      values: |
        opencost:
          exporter:
            defaultClusterId: private-ai-platform-kit-local
          # Point OpenCost at the kube-prometheus-stack Prometheus this repo actually
          # installs; the chart default (prometheus-server.prometheus.svc) targets the
          # community prometheus chart and leaves every allocation panel empty.
          prometheus:
            internal:
              enabled: true
              serviceName: kube-prometheus-stack-prometheus
              namespaceName: monitoring
              port: 9090
  destination:
    server: https://kubernetes.default.svc
    namespace: opencost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
