replicaCount: 2
runtime:
  backend: ollama
  modelId: qwen3.5:0.8b
  ollamaBaseUrl: http://ollama.ollama.svc.cluster.local:11434
  vllmBaseUrl: http://vllm.vllm.svc.cluster.local:8000
  allowedModels:
    - qwen3.5:0.8b
    - Qwen/Qwen3-Coder-Next
    - BAAI/bge-small-en-v1.5
routing:
  policy:
    enabled: true
    models:
      - id: qwen3.5:0.8b
        backend: ollama
      - id: Qwen/Qwen3-Coder-Next
        backend: vllm
      # Governed embedding model, proxied through the gateway's /v1/embeddings route.
      - id: BAAI/bge-small-en-v1.5
        backend: vllm
admission:
  # Sized for a real coding-agent session against a large-context vLLM model (the
  # runtime chart serves a 262k-token context): a long multi-turn session must not hit
  # a hard 400 on message count or prompt size within the first few exchanges.
  maxMessages: 512
  maxPromptChars: 786432
  maxCompletionTokens: 32768
  # Streaming on: chat UIs and coding agents stream by default. Air-gapped/regulated
  # deployments that require end-of-stream-only guardrail enforcement set this false.
  allowStreaming: true
guardrails:
  promptSecretDetection:
    enabled: true
    # Redact (not reject) so an agent reading a .env or lockfile keeps working while the
    # credential is still stripped before it reaches the runtime.
    mode: redact
    patterns:
      - private_key
      - github_token
      - slack_token
      - aws_access_key_id
      - google_api_key
      - bearer_token
      - generic_api_key_assignment
budget:
  enabled: true
  backend: redis
  requestLimit: 10000
  promptCharLimit: 50000000
  estimatedTokenLimit: 15000000
  estimatedCharsPerToken: 4
  windowSeconds: 86400
  redisUrl: redis://budget-redis.budget.svc.cluster.local:6379/0
  redisTimeoutSeconds: "0.5"
  keyPrefix: private-ai-platform-kit:customer:sandbox-budget
networkPolicy:
  runtimeEgress:
    - namespace: ollama
      port: 11434
    - namespace: vllm
      port: 8000
    - namespace: budget
      port: 6379
podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: customer
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: customer-lab
traceability:
  auditLogEnabled: true
  defaultSandboxId: customer-lab
auth:
  enabled: true
  apiKeyHeader: X-API-Key
  existingSecret:
    name: inference-gateway-secrets
    key: api-key-sha256s
  # JWT bearer validation with per-tenant sandbox binding. TEMPLATE - the operator MUST
  # replace the placeholder issuer/JWKS/audience below with their real IdP before this
  # overlay authenticates anyone by JWT; until then only the API-key hashes above work.
  # With tenantClaim set, the sandbox id is taken from the verified `sandbox_id` claim:
  # a token whose claim contradicts the X-Sandbox-ID header is rejected (403), and
  # /v1/usage + /v1/sandbox/budget then reflect only the caller's own tenant. If your IdP
  # cannot emit a `sandbox_id` claim, point tenantClaim at a claim it does emit that
  # uniquely identifies the tenant (commonly `azp` for the client-credentials app id, or
  # `sub`). API-key hashes remain the break-glass path during IdP outages.
  jwt:
    enabled: true
    # Placeholder - well-formed but non-routable example.com URL so Helm rendering and
    # `make validate` stay green; the gateway only fetches it once a JWT is presented.
    jwksUrl: "https://idp.example.com/.well-known/jwks.json"
    issuer: "https://idp.example.com/"
    audience: "private-ai-platform-kit"
    requiredScopes: []
    cacheSeconds: 300
    tenantClaim: "sandbox_id"
keda:
  enabled: true
  minReplicaCount: 2
  maxReplicaCount: 20
  threshold: "25"
