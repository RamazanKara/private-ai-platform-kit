fullnameOverride: ollama
replicaCount: 1
model:
  name: qwen3.5:0.8b
  # pullOnStart stays off so an air-gapped cluster never dials out. Preload the model
  # before first traffic: `kubectl -n ollama exec sts/ollama -- ollama pull qwen3.5:0.8b`
  # (or pre-seed the PVC); until then chat requests 404 at the runtime.
  pullOnStart: false
persistence:
  enabled: true
  size: 50Gi
podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: customer
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: customer-lab
