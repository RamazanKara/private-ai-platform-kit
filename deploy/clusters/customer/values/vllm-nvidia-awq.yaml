fullnameOverride: vllm
replicaCount: 2
image:
  repository: vllm/vllm-openai
  tag: "v0.22.0"
  pullPolicy: IfNotPresent
# AWQ 4-bit weight-quantization profile for Ampere-class GPUs (A100/A10) that lack native
# FP8. Point model.name at a pre-quantized AWQ checkpoint (…-AWQ) hosted in your model store;
# AWQ compresses weights ~4x so the model fits on fewer/smaller GPUs. KV cache stays in the
# model dtype (Ampere has no FP8 KV cache). Validate quality with `make eval` before promoting.
model:
  name: Qwen/Qwen3-Coder-Next-AWQ
  dtype: auto
  maxModelLen: "262144"
server:
  quantization: awq
  gpuMemoryUtilization: "0.90"
  enablePrefixCaching: true
accelerator:
  enabled: true
  vendor: nvidia
  resourceName: nvidia.com/gpu
  count: 2
  nodeSelector:
    platform.ai/node-pool: gpu
    platform.ai/gpu-vendor: nvidia
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
extraArgs:
  - --tensor-parallel-size
  - "2"
  - --enable-auto-tool-choice
  - --tool-call-parser
  - qwen3_coder
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
keda:
  enabled: true
  minReplicaCount: 2
  maxReplicaCount: 8
  threshold: "5"
  prometheusServerAddress: http://kube-prometheus-stack-prometheus.monitoring:9090
cache:
  persistence:
    enabled: true
    size: 200Gi
    accessMode: ReadWriteMany
    storageClassName: ""
externalSecrets:
  enabled: true
  huggingFaceTokenSecretName: hf-token
  huggingFaceTokenKey: token
podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: customer
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: customer-lab
