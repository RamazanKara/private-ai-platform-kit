namespace:
  name: ai-agents

sandbox:
  id: customer-agent-lab
  tenant: coding-agents
  owner: agent-platform
  costCenter: research
  environment: customer
  # Pair the standard agent-sandbox runtime with a kernel-isolation runtime
  # class where the cluster provides one (ADR 0010); mandated at high tier.
  # runtimeClassName: gvisor

resourceQuota:
  requestsCpu: "8"
  requestsMemory: 16Gi
  limitsCpu: "16"
  limitsMemory: 32Gi
  pods: "40"
  persistentVolumeClaims: "8"
  secrets: "20"
  configMaps: "60"

workspace:
  pvc:
    size: 50Gi

networkPolicy:
  allowedEgressCidrs: []
  # External CIDRs must be approved in platform/network/egress-catalog.yaml and include catalogRef.
