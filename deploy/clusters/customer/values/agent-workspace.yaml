namespace:
  name: ai-agents

sandbox:
  id: customer-agent-lab
  tenant: coding-agents
  owner: agent-platform
  costCenter: research
  environment: customer
  # Recommended on customer clusters once the agent-sandbox controller is
  # installed (make agent-sandbox-install); pair with a kernel-isolation
  # runtime class where available (ADR 0009).
  runtime: namespace
  # runtime: agent-sandbox
  # runtimeClassName: gvisor

resourceQuota:
  requestsCpu: "8"
  requestsMemory: 16Gi
  limitsCpu: "16"
  limitsMemory: 32Gi
  pods: "40"
  persistentVolumeClaims: "8"
  secrets: "20"
  configMaps: "60"

workspace:
  pvc:
    size: 50Gi

networkPolicy:
  allowedEgressCidrs: []
  # External CIDRs must be approved in platform/network/egress-catalog.yaml and include catalogRef.
