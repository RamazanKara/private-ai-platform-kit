fullnameOverride: vllm
replicaCount: 2
model:
  name: Qwen/Qwen3-Coder-Next
accelerator:
  enabled: true
  vendor: nvidia
  resourceName: nvidia.com/gpu
  count: 4
  nodeSelector:
    platform.ai/node-pool: gpu
    platform.ai/gpu-vendor: nvidia
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
# CPU-based HPA is disabled: vLLM is GPU-bound, so CPU% never reflects real load
# and would never scale a saturated GPU server (the chart calls CPU the wrong
# signal). Scale on request-queue depth via KEDA instead (below).
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
# Queue-based GPU autoscaling. Requires the KEDA operator and a Prometheus reachable
# at prometheusServerAddress scraping vLLM metrics. Adjust the address to this
# cluster's Prometheus if it differs from the kube-prometheus-stack default.
keda:
  enabled: true
  minReplicaCount: 2
  maxReplicaCount: 8
  threshold: "5"
  prometheusServerAddress: http://kube-prometheus-stack-prometheus.monitoring:9090
# Persist model weights on a shared volume so the 100+ GB model is not re-downloaded
# on every pod restart or KEDA scale-up. ReadWriteMany lets the replicas share one
# copy; set storageClassName to an RWX-capable class (e.g. a cloud filestore/EFS).
# If only ReadWriteOnce is available, set replicaCount: 1 or pre-bake the weights
# into the image instead.
cache:
  persistence:
    enabled: true
    size: 400Gi
    accessMode: ReadWriteMany
    storageClassName: ""
externalSecrets:
  enabled: true
  huggingFaceTokenSecretName: hf-token
  huggingFaceTokenKey: token
podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: customer
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: customer-lab
