fullnameOverride: vllm
replicaCount: 2
model:
  name: Qwen/Qwen3-Coder-Next
accelerator:
  enabled: true
  vendor: nvidia
  resourceName: nvidia.com/gpu
  count: 4
  nodeSelector:
    platform.ai/node-pool: gpu
    platform.ai/gpu-vendor: nvidia
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
externalSecrets:
  enabled: true
  huggingFaceTokenSecretName: hf-token
  huggingFaceTokenKey: token
podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: customer
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: customer-lab
