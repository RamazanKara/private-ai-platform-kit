replicaCount: 2

podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: customer
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: customer-lab

traceability:
  auditLogEnabled: true
  defaultSandboxId: customer-lab

retrieval:
  backend: qdrant
  # Enforce per-tenant retrieval isolation in the multi-tenant customer profile: a query
  # only sees documents stamped with its own tenant (owner) and fails closed when the
  # tenant is unresolved. The tenant id must reach the RAG service from a trusted source
  # (the gateway derives X-Sandbox-ID from a verified JWT claim); see runbooks/rag-service.md.
  tenantIsolation:
    enabled: true
    field: owner
  # Governed reference embedding model (BAAI/bge-small-en-v1.5, 384-dim) served via vLLM
  # embedding mode or a TEI sidecar behind an OpenAI-compatible endpoint; replaces the demo
  # hashed-vector default. See platform/model-catalog/models.yaml and model-provenance.yaml.
  # OPERATOR PREREQUISITE: nothing in this repo deploys the embedding server. Install a
  # second vLLM release (e.g. `helm install vllm-embeddings deploy/charts/vllm -n vllm`
  # with --task embed and this model) or a TEI deployment exposing this Service name,
  # and keep networkPolicy.embeddingEgress below pointed at it.
  embedding:
    provider: openai-compatible
    baseUrl: http://vllm-embeddings.vllm.svc.cluster.local:8000
    model: BAAI/bge-small-en-v1.5
  vectorStore:
    url: http://qdrant-vector-store.vector.svc.cluster.local:6333
    collection: customer-platform-knowledge
    collectionVersion: v1
    timeoutSeconds: 1.0
    dimensions: 384
    bootstrapFromKnowledge: true

auth:
  enabled: true
  apiKeyHeader: X-API-Key
  existingSecret:
    name: rag-service-secrets
    key: api-key-sha256s
  # Audience-bound JWT verification on the RAG service itself. TEMPLATE - the operator MUST
  # replace the placeholder issuer/JWKS/audience below with their real IdP before this overlay
  # verifies any token; until then the API-key hashes above remain the only accepted credential.
  # With this on, the tenant is DERIVED from the verified `tenantClaim` and the tenant-isolation
  # filter above scopes retrieval to that verified tenant: a token whose claim contradicts the
  # X-Sandbox-ID header is rejected (403), closing the last gap where a direct caller under the
  # shared API key could assert another tenant's id. Point `tenantClaim` at whatever claim your
  # IdP emits to uniquely identify the tenant (commonly `sandbox_id`, else `azp`/`sub`) — it must
  # match the `owner` value documents are ingested with. `required: true` is MANDATORY for
  # this multi-tenant profile: with `required: false`, a caller could simply omit the token
  # and fall back to the (spoofable) X-Sandbox-ID header, reopening the cross-tenant gap this
  # config exists to close. Use `required: false` only where the RAG service is reachable
  # exclusively through the gateway (which already verifies the JWT and stamps the header).
  jwt:
    enabled: true
    # Placeholder - well-formed but non-routable example.com URL so Helm rendering and
    # `make validate` stay green; the service only fetches it once a JWT is presented.
    jwksUrl: "https://idp.example.com/.well-known/jwks.json"
    issuer: "https://idp.example.com/"
    audience: "private-ai-platform-kit-rag"
    tenantClaim: "sandbox_id"
    cacheSeconds: 300
    requestTimeoutSeconds: 5.0
    required: true

# Without this egress opening, the RAG pod's own NetworkPolicy blocks the embedding
# calls that `retrieval.embedding` above configures (chart default is disabled).
networkPolicy:
  embeddingEgress:
    enabled: true
    namespace: vllm
    port: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 750m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
