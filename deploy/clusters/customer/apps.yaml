apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: budget-redis
  namespace: argocd
spec:
  project: private-ai-platform
  source:
    repoURL: https://github.com/RamazanKara/private-ai-platform-kit.git
    targetRevision: v0.24.0
    path: deploy/charts/budget-redis
    helm:
      releaseName: budget-redis
      values: |
        podLabels:
          platform.ai/cost-center: platform
          platform.ai/environment: customer
          platform.ai/owner: platform-team
          platform.ai/sandbox-id: shared-budget
  destination:
    server: https://kubernetes.default.svc
    namespace: budget
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
