apiVersion: v1
kind: Namespace
metadata:
  name: platform-secrets
  labels:
    app.kubernetes.io/name: platform-secrets
    app.kubernetes.io/part-of: private-ai-platform-kit
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: customer-kubernetes-store
spec:
  provider:
    kubernetes:
      remoteNamespace: platform-secrets
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: platform-secrets
          key: ca.crt
      auth:
        serviceAccount:
          name: external-secrets
          namespace: platform-operators
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: inference-gateway-secrets
  namespace: inference
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: customer-kubernetes-store
    kind: ClusterSecretStore
  target:
    name: inference-gateway-secrets
  data:
    - secretKey: api-key-sha256s
      remoteRef:
        key: ai-platform-customer-secrets
        property: api-key-sha256s
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rag-service-secrets
  namespace: rag
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: customer-kubernetes-store
    kind: ClusterSecretStore
  target:
    name: rag-service-secrets
  data:
    - secretKey: api-key-sha256s
      remoteRef:
        key: ai-platform-customer-secrets
        property: api-key-sha256s
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hf-token
  namespace: vllm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: customer-kubernetes-store
    kind: ClusterSecretStore
  target:
    name: hf-token
  data:
    - secretKey: token
      remoteRef:
        key: ai-platform-customer-secrets
        property: hf-token
