apiVersion: v1
kind: Namespace
metadata:
  name: ai-sandbox
  labels:
    app.kubernetes.io/name: ai-sandbox
    app.kubernetes.io/part-of: private-ai-platform-kit
    platform.ai/cost-center: platform
    platform.ai/environment: local
    platform.ai/owner: platform-team
    platform.ai/sandbox-id: local-lab
    platform.ai/traceable-sandbox: "true"
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
