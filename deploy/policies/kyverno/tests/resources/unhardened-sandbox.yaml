apiVersion: agents.x-k8s.io/v1beta1
kind: Sandbox
metadata:
  name: unhardened-sandbox
  namespace: ai-agents
  labels:
    platform.ai/sandbox-id: agent-lab
    platform.ai/traceable-sandbox: "true"
spec:
  podTemplate:
    metadata:
      labels:
        platform.ai/sandbox-id: agent-lab
        platform.ai/traceable-sandbox: "true"
    spec:
      automountServiceAccountToken: true
      containers:
        - name: workspace
          image: curlimages/curl:8.20.0
          command:
            - /bin/sh
            - -c
            - sleep infinity
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
