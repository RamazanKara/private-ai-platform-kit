apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: local-model-pull-egress
  namespace: ollama
  labels:
    platform.ai/environment: local
  annotations:
    platform.ai/local-model-pull-egress: "true"
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
