apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: customer-model-pull-exception
  namespace: vllm
  labels:
    platform.ai/environment: customer
  annotations:
    platform.ai/local-model-pull-egress: "true"
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
