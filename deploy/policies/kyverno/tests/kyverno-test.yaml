apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ai-platform-policy-tests
policies:
  - ../policies.yaml
resources:
  - resources/good-pod.yaml
  - resources/latest-pod.yaml
  - resources/privileged-pod.yaml
  - resources/missing-resources-pod.yaml
  - resources/writable-root-pod.yaml
  - resources/encrypted-pvc.yaml
  - resources/unencrypted-pvc.yaml
  - resources/good-sandbox.yaml
  - resources/unhardened-sandbox.yaml
  - resources/unscoped-egress.yaml
  - resources/local-model-pull-egress.yaml
  - resources/customer-model-pull-exception.yaml
results:
  - policy: ai-platform-required-labels
    rule: require-platform-labels
    resources:
      - good-pod
    kind: Pod
    result: pass
  - policy: ai-platform-image-and-resources
    rule: block-latest-tags
    resources:
      - latest-pod
    kind: Pod
    result: fail
  - policy: ai-platform-restricted-pods
    rule: disallow-privileged
    resources:
      - privileged-pod
    kind: Pod
    result: fail
  - policy: ai-platform-image-and-resources
    rule: require-requests-and-limits
    resources:
      - missing-resources-pod
    kind: Pod
    result: fail
  - policy: ai-platform-restricted-pods
    rule: require-read-only-root-filesystem
    resources:
      - writable-root-pod
    kind: Pod
    result: fail
  - policy: ai-platform-pvc-encryption-at-rest
    rule: require-encryption-at-rest-label
    resources:
      - encrypted-pvc
    kind: PersistentVolumeClaim
    result: pass
  - policy: ai-platform-pvc-encryption-at-rest
    rule: require-encryption-at-rest-label
    resources:
      - unencrypted-pvc
    kind: PersistentVolumeClaim
    result: fail
  - policy: ai-platform-hardened-sandboxes
    rule: require-sandbox-identity-labels
    resources:
      - good-sandbox
    kind: Sandbox
    result: pass
  - policy: ai-platform-hardened-sandboxes
    rule: require-hardened-sandbox-containers
    resources:
      - good-sandbox
    kind: Sandbox
    result: pass
  - policy: ai-platform-hardened-sandboxes
    rule: require-hardened-sandbox-pod-template
    resources:
      - unhardened-sandbox
    kind: Sandbox
    result: fail
  - policy: ai-platform-restrict-egress-cidrs
    rule: deny-unscoped-egress-rules
    resources:
      - unscoped-egress
    kind: NetworkPolicy
    result: fail
  - policy: ai-platform-restrict-egress-cidrs
    rule: deny-broad-egress-cidrs
    resources:
      - local-model-pull-egress
    kind: NetworkPolicy
    result: skip
  - policy: ai-platform-restrict-egress-cidrs
    rule: restrict-local-model-pull-exception
    resources:
      - local-model-pull-egress
    kind: NetworkPolicy
    result: pass
  - policy: ai-platform-restrict-egress-cidrs
    rule: restrict-local-model-pull-exception
    resources:
      - customer-model-pull-exception
    kind: NetworkPolicy
    result: fail
  - policy: ai-platform-hardened-sandboxes
    rule: require-hardened-sandbox-containers
    resources:
      - unhardened-sandbox
    kind: Sandbox
    result: fail
