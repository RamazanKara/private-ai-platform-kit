apiVersion: v2
name: platform
description: >-
  Umbrella chart that installs the full Private AI Platform Kit stack (inference gateway, RAG
  service, Ollama/vLLM runtimes, Qdrant vector store, budget Redis) as one release. Each
  component is toggled with its <name>.enabled flag. GitOps (Argo CD) remains the recommended
  path for multi-namespace installs; this chart is for a single-command dev/demo bring-up.
type: application
version: 0.23.0
appVersion: "0.23.0"
dependencies:
  - name: inference-gateway
    version: ">=0.0.0"
    repository: "file://../inference-gateway"
    condition: inference-gateway.enabled
  - name: rag-service
    version: ">=0.0.0"
    repository: "file://../rag-service"
    condition: rag-service.enabled
  - name: ollama
    version: ">=0.0.0"
    repository: "file://../ollama"
    condition: ollama.enabled
  - name: budget-redis
    version: ">=0.0.0"
    repository: "file://../budget-redis"
    condition: budget-redis.enabled
  - name: qdrant-vector-store
    version: ">=0.0.0"
    repository: "file://../qdrant-vector-store"
    condition: qdrant-vector-store.enabled
  - name: vllm
    version: ">=0.0.0"
    repository: "file://../vllm"
    condition: vllm.enabled
