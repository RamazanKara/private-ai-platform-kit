apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "budget-redis.fullname" . }}
  labels:
    {{- include "budget-redis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "budget-redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "budget-redis.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "budget-redis.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: {{ include "budget-redis.image" .Values.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --protected-mode
            - "no"
            {{- if .Values.auth.enabled }}
            - --requirepass
            - $(REDIS_PASSWORD)
            {{- end }}
          {{- if .Values.auth.enabled }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret.name }}
                  key: {{ .Values.auth.existingSecret.key }}
            # redis-cli health probes pick up REDISCLI_AUTH automatically.
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret.name }}
                  key: {{ .Values.auth.existingSecret.key }}
          {{- end }}
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: redis-data
          emptyDir: {}
