{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name | default .Release.Namespace }}
  labels:
    # Apiserver-native Pod Security Admission floor for this platform data-plane namespace,
    # enforced independently of the Kyverno admission webhook (defense in depth). The platform
    # pods already satisfy the restricted profile (non-root, drop-ALL caps, read-only root,
    # seccomp RuntimeDefault), so enforcing here does not change scheduling.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    app.kubernetes.io/part-of: private-ai-platform-kit
{{- end }}
