replicaCount: 1

image:
  repository: ollama/ollama
  # tag is kept as documentation; digest pins the multi-arch manifest list.
  tag: "0.24.0"
  digest: "sha256:a6149234667efc71d37766d61c1a16f24c33e4cd7a0bf4125c44a7e47e2419c4"
  pullPolicy: IfNotPresent

model:
  name: qwen3.5:0.8b
  pullOnStart: false

service:
  port: 11434

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

persistence:
  enabled: true
  size: 20Gi

# Startup probe covers model pull/load on first start (Ollama returns 200
# "Ollama is running" on GET /). Liveness and readiness checks do not begin
# until it first succeeds. failureThreshold x periodSeconds is the total
# cold-start grace window (default 30 x 10s = 5 minutes).
startupProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Steady-state liveness probe: restarts the container if GET / stops responding
# after startup. failureThreshold kept lenient to avoid restarts on brief stalls.
livenessProbe:
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

podDisruptionBudget:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: local
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: local-lab

# Data-plane namespace with an apiserver-native Pod Security Admission restricted floor.
# create=false when the namespace is managed elsewhere; name defaults to the release namespace.
namespace:
  create: true
  name: ""
