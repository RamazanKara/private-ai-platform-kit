# Single-instance only (enforced by values.schema.json); raising replicaCount is unsafe on the shared RWO PVC.
replicaCount: 1

image:
  repository: qdrant/qdrant
  # tag is kept as documentation; digest pins the multi-arch manifest list.
  tag: "v1.18.1"
  digest: "sha256:45f8e3ddc2570a4d029877e1b5ec1045c19b3852b4e22a55c7f43b05aea0ca89"
  pullPolicy: IfNotPresent

service:
  httpPort: 6333
  grpcPort: 6334

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

persistence:
  enabled: true
  size: 20Gi
  storageClassName: ""
  mountPath: /qdrant/storage

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi

podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: local
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: rag-vector

podDisruptionBudget:
  enabled: true
  # 0 for a single-replica chart (matching budget-redis): minAvailable 1 with one
  # replica blocks every node drain, trading a brief eviction outage for cluster
  # operability. Raise together with replicaCount.
  minAvailable: 0

networkPolicy:
  enabled: true
  allowedIngressNamespaces:
    - rag
    - monitoring

serviceMonitor:
  enabled: true
  interval: 30s

# Data-plane namespace with an apiserver-native Pod Security Admission restricted floor.
# create=false when the namespace is managed elsewhere; name defaults to the release namespace.
namespace:
  create: true
  name: ""
