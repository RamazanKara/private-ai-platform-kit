apiVersion: v1
kind: Service
metadata:
  name: {{ include "qdrant-vector-store.fullname" . }}
  labels:
    {{- include "qdrant-vector-store.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "qdrant-vector-store.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
