{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-workspace-default-deny
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agent-workspace.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-workspace-approved-egress
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agent-workspace.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    {{- if .Values.networkPolicy.allowDns }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.gateway.namespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.gateway.port }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.rag.namespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.rag.port }}
    {{- range .Values.networkPolicy.allowedEgressCidrs }}
    {{- /* Reject ungoverned egress at render time: every CIDR must cite a catalogRef
           reviewed in platform/network/egress-catalog.yaml. The CI egress-governance check only
           scans the reviewed tenant spec files, so this closes the --set / out-of-band
           overlay bypass. */}}
    {{- $catalogRef := required (printf "agent-workspace: allowedEgressCidrs entry %s must set a non-empty catalogRef governed by platform/network/egress-catalog.yaml" .cidr) .catalogRef }}
    - to:
        - ipBlock:
            cidr: {{ .cidr | quote }}
      ports:
        {{- range .ports }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
{{- end }}
