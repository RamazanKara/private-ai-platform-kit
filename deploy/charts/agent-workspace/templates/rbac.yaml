{{- if .Values.rbac.create }}
# Read-only role for both the workspace ServiceAccount and the (human) viewer group.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-workspace-runner
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agent-workspace.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-workspace-runner
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agent-workspace.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-workspace.serviceAccountName" . }}
    namespace: {{ .Values.namespace.name }}
  - kind: Group
    name: {{ .Values.rbac.viewerGroup }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: agent-workspace-runner
  apiGroup: rbac.authorization.k8s.io
{{- if .Values.rbac.allowJobManagement }}
---
# Job management is granted to the workspace ServiceAccount ONLY, never the viewer group,
# so enabling allowJobManagement does not silently let every human in viewerGroup
# create/delete Jobs in the namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-workspace-jobs
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agent-workspace.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-workspace-jobs
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agent-workspace.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-workspace.serviceAccountName" . }}
    namespace: {{ .Values.namespace.name }}
roleRef:
  kind: Role
  name: agent-workspace-jobs
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
