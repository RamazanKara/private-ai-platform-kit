replicaCount: 1

image:
  repository: ghcr.io/ramazankara/private-ai-platform-kit/rag-service
  # First-party image: release CI pins the published digest (set image.digest) after build.
  tag: "v0.23.0"
  pullPolicy: IfNotPresent

service:
  port: 8080

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

traceability:
  auditLogEnabled: true
  defaultSandboxId: local-lab

auth:
  enabled: false
  apiKeyHeader: X-API-Key
  apiKeyHashes: []
  existingSecret:
    name: ""
    key: api-key-sha256s
  # Audience-bound JWT verification. When enabled the RAG service verifies the caller's own
  # bearer token (JWKS/issuer/audience/exp/nbf) and DERIVES the tenant from the verified
  # `tenantClaim` — the tenant-isolation filter then scopes retrieval to that verified tenant
  # instead of trusting the X-Sandbox-ID header (a contradicting header is rejected with 403).
  # `required: true` makes a valid token mandatory (no/invalid token -> 401); an unreachable
  # JWKS issuer with no cached keys -> 503. OFF here (the base chart and local lab keep it off):
  # header-trust is unchanged and backward compatible. Multi-tenant customer profiles enable it
  # (see deploy/clusters/customer/values/rag-service.yaml) — the same closed identity boundary
  # the inference gateway provides, now on the RAG service itself.
  jwt:
    enabled: false
    jwksUrl: ""
    issuer: ""
    audience: ""
    tenantClaim: sandbox_id
    cacheSeconds: 300
    requestTimeoutSeconds: 5.0
    required: false

retrieval:
  backend: lexical
  maxQueryChars: 2048
  defaultTopK: 3
  maxTopK: 8
  maxContextChars: 6000
  # Hybrid retrieval (Qdrant backend): over-fetch candidateMultiplier x topK dense
  # candidates, then rerank by dense score blended with lexical query-term overlap
  # (lexicalWeight 0..1; 0 = pure dense). allowedClassifications (when set) access-scopes
  # retrieval to documents whose classification is in the list; empty returns all.
  candidateMultiplier: 4
  lexicalWeight: 0.5
  allowedClassifications: []
  # Per-tenant retrieval isolation: when enabled, a caller only retrieves documents whose
  # `field` payload value (stamped at ingest, default `owner`) equals the request's
  # X-Sandbox-ID. Both backends honor it (the lexical corpus is stamped with the default
  # sandbox id). Fails closed: a tenant with no matching documents — or a request that did not
  # explicitly assert X-Sandbox-ID — gets nothing rather than the whole corpus. Requires
  # ingesting documents with owner set to the tenant/sandbox id.
  #
  # The application default is ON (`RAG_RETRIEVAL_TENANT_ISOLATION_ENABLED` defaults true).
  # This chart ships it OFF because the bundled local profile is a single-tenant lexical lab
  # that serves shared platform docs to every caller; MULTI-TENANT / customer profiles MUST
  # set `enabled: true` (see deploy/clusters/customer/values/rag-service.yaml and the RAG
  # service runbook).
  #
  # Trust boundary: X-Sandbox-ID is client-asserted under the shared API key, so this isolates
  # tenants whose traffic arrives via a trusted path (gateway JWT tenant binding or a header-
  # stamping egress proxy), not against a direct caller lying about its tenant. Per-caller
  # identity on the RAG service itself (RAG verifying its own token) is roadmap work.
  tenantIsolation:
    enabled: false
    field: owner
  # Optional cross-encoder reranker second stage (Qdrant backend): reorders the over-fetched
  # candidates by joint query-document relevance. provider "none" keeps the hybrid ranking;
  # "openai-compatible" calls a Cohere/Jina/TEI-compatible /rerank endpoint. A reranker outage
  # is non-fatal (the hybrid ranking is kept).
  reranker:
    provider: none
    baseUrl: ""
    model: ""
    timeoutSeconds: 2.0
  vectorStore:
    url: ""
    collection: private-ai-platform-kit
    collectionVersion: v1
    timeoutSeconds: 1.0
    dimensions: 384
    bootstrapFromKnowledge: true
  embedding:
    provider: hash
    baseUrl: ""
    model: hash-text-v1

knowledge:
  mountPath: /knowledge
  documents:
    platform-overview.md: |
      # Private AI Platform Kit

      Private AI Platform Kit is a local-first, provider-neutral Kubernetes platform
      for private LLM and coding-agent workloads. The local stack runs on kind.
      Customer clusters bring their own Kubernetes, ingress, storage, secrets,
      GPU nodes, and enterprise observability.
    coding-agents.md: |
      # Coding Agents

      Coding agents should call the inference gateway with X-Request-ID,
      X-Sandbox-ID, and traceparent when available. Agent workloads run in
      isolated namespaces with quota, default limits, default-deny network
      policy, workspace storage, and explicit egress to approved platform APIs.
    controls.md: |
      # Platform Controls

      The platform includes model catalog governance, gateway admission controls,
      Redis-backed sandbox budgets, redacted audit logs, Prometheus metrics,
      evaluation evidence, restore-drill evidence, policy-as-code, SBOMs,
      signed images, tenant labs, and controlled chaos drills.
    accelerators.md: |
      # Accelerator Support

      Ollama is the default local runtime. vLLM is the production-style runtime
      for customer clusters. NVIDIA profiles request nvidia.com/gpu and AMD ROCm
      profiles request amd.com/gpu.

sourceManifest:
  enabled: false
  path: ""
  mountPath: /rag-sources/source-manifest.yaml
  manifest:
    apiVersion: platform.ai/v1alpha1
    kind: RagSourceManifest
    metadata:
      name: platform-knowledge
    spec:
      sources: []

ingestion:
  enabled: false
  backoffLimit: 1
  restartPolicy: Never
  chunkChars: 1200
  overlapChars: 120
  annotations: {}

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    cpu: 300m
    memory: 256Mi

podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: local
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: local-lab

serviceMonitor:
  enabled: true
  interval: 30s

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

networkPolicy:
  enabled: true
  allowedIngressNamespaces:
    - ai-agents
    - ai-sandbox
    - monitoring
  allowedIngressNamespaceLabels:
    - platform.ai/traceable-sandbox: "true"
  dnsEgress:
    namespace: kube-system
    port: 53
  vectorStoreEgress:
    enabled: true
    namespace: vector
    port: 6333
  # Enable when retrieval.embedding.provider is not `hash` and embedding.baseUrl
  # points at an in-cluster embedding service; allows egress to that namespace/port.
  embeddingEgress:
    enabled: false
    namespace: ""
    port: 8080

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

observability:
  tracing:
    enabled: false
    otlpEndpoint: ""
    serviceName: rag-service

# `helm test` connection probe. Rendered for validation; only created by `helm test`.
tests:
  enabled: true
  image:
    repository: busybox
    # tag is kept as documentation; digest pins the multi-arch manifest list.
    tag: "1.37.0"
    digest: "sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028"

# Data-plane namespace with an apiserver-native Pod Security Admission restricted floor.
# create=false when the namespace is managed elsewhere; name defaults to the release namespace.
namespace:
  create: true
  name: ""
