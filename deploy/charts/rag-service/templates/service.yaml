apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-service.fullname" . }}
  labels:
    {{- include "rag-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "rag-service.selectorLabels" . | nindent 4 }}
