{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rag-service.fullname" . }}
  labels:
    {{- include "rag-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rag-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
        {{- range .Values.networkPolicy.allowedIngressNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        {{- range .Values.networkPolicy.allowedIngressNamespaceLabels }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: http
  egress:
    # DNS is always allowed: it is required by any non-`hash` embedding provider
    # or Qdrant lookup, and is harmless when the service makes no outbound calls.
    # (Rendering it unconditionally avoids a deny-all-egress footgun in lexical mode,
    # where policyTypes still lists Egress.)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsEgress.namespace | quote }}
      ports:
        - protocol: UDP
          port: {{ .Values.networkPolicy.dnsEgress.port }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.dnsEgress.port }}
  {{- if and (eq .Values.retrieval.backend "qdrant") .Values.networkPolicy.vectorStoreEgress.enabled }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.vectorStoreEgress.namespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.vectorStoreEgress.port }}
  {{- end }}
  {{- if .Values.networkPolicy.embeddingEgress.enabled }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.embeddingEgress.namespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.embeddingEgress.port }}
  {{- end }}
{{- end }}
