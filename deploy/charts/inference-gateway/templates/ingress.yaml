{{- if .Values.ingress.enabled }}
# Optional Ingress for the OpenAI-compatible gateway API. Disabled by default so the
# local lab keeps its zero-dependency port-forward access; enable and set a host (and TLS)
# for cluster-external clients. The gateway NetworkPolicy must also permit traffic from the
# ingress controller namespace.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "inference-gateway.fullname" . }}
  labels:
    {{- include "inference-gateway.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "inference-gateway.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
