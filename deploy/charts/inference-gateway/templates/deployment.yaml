apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inference-gateway.fullname" . }}
  labels:
    {{- include "inference-gateway.labels" . | nindent 4 }}
spec:
  {{- if not .Values.keda.enabled }}
  {{- /* When KEDA owns scaling, omit replicas so Argo CD selfHeal does not revert
         every scale-up back to the Git value (a permanent autoscaling flap). */}}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "inference-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "inference-gateway.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "inference-gateway.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpread.maxSkew }}
          topologyKey: {{ .Values.topologySpread.topologyKey | quote }}
          whenUnsatisfiable: {{ .Values.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "inference-gateway.selectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "inference-gateway.image" .Values.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: RUNTIME_BACKEND
              value: {{ .Values.runtime.backend | quote }}
            - name: MODEL_ID
              value: {{ .Values.runtime.modelId | quote }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.runtime.ollamaBaseUrl | quote }}
            - name: VLLM_BASE_URL
              value: {{ .Values.runtime.vllmBaseUrl | quote }}
            - name: REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.runtime.requestTimeoutSeconds | quote }}
            - name: RUNTIME_MAX_RETRIES
              value: {{ .Values.runtime.maxRetries | quote }}
            - name: RUNTIME_RETRY_BACKOFF_SECONDS
              value: {{ .Values.runtime.retryBackoffSeconds | quote }}
            - name: RUNTIME_CIRCUIT_FAILURE_THRESHOLD
              value: {{ .Values.runtime.circuitFailureThreshold | quote }}
            - name: RUNTIME_CIRCUIT_RESET_SECONDS
              value: {{ .Values.runtime.circuitResetSeconds | quote }}
            - name: ALLOWED_MODELS
              value: {{ join "," .Values.runtime.allowedModels | quote }}
            - name: MODEL_ROUTING_POLICY_PATH
              {{- if .Values.routing.policy.enabled }}
              value: "/etc/private-ai-platform-kit/model-routing-policy.yaml"
              {{- else }}
              value: {{ .Values.routing.policyPath | quote }}
              {{- end }}
            - name: SANDBOX_POLICY_PATH
              {{- if .Values.sandboxPolicy.policy.enabled }}
              value: "/etc/private-ai-platform-kit/sandbox-policy.yaml"
              {{- else }}
              value: {{ .Values.sandboxPolicy.policyPath | quote }}
              {{- end }}
            - name: MAX_MESSAGES
              value: {{ .Values.admission.maxMessages | quote }}
            - name: MAX_PROMPT_CHARS
              value: {{ .Values.admission.maxPromptChars | quote }}
            - name: MAX_REQUEST_BODY_BYTES
              value: {{ .Values.admission.maxRequestBodyBytes | int64 | quote }}
            - name: MAX_COMPLETION_TOKENS
              value: {{ .Values.admission.maxCompletionTokens | quote }}
            - name: MAX_COMPLETIONS_PER_REQUEST
              value: {{ .Values.admission.maxCompletionsPerRequest | quote }}
            - name: IMAGE_PART_TOKEN_ESTIMATE
              value: {{ .Values.admission.imagePartTokenEstimate | quote }}
            - name: MAX_IMAGE_BYTES
              value: {{ .Values.admission.maxImageBytes | quote }}
            - name: MAX_TOOLS
              value: {{ .Values.admission.maxTools | quote }}
            - name: MAX_TOOL_CHARS
              value: {{ .Values.admission.maxToolChars | quote }}
            - name: ALLOW_STREAMING
              value: {{ .Values.admission.allowStreaming | quote }}
            - name: RATE_LIMIT_ENABLED
              value: {{ .Values.rateLimit.enabled | quote }}
            - name: RATE_LIMIT_REQUESTS_PER_WINDOW
              value: {{ .Values.rateLimit.requestsPerWindow | quote }}
            - name: RATE_LIMIT_WINDOW_SECONDS
              value: {{ .Values.rateLimit.windowSeconds | quote }}
            - name: RATE_LIMIT_FAIL_OPEN
              value: {{ .Values.rateLimit.failOpen | quote }}
            - name: MAX_CONCURRENT_REQUESTS
              value: {{ .Values.concurrency.maxConcurrentRequests | quote }}
            - name: MAX_BATCH_REQUESTS
              value: {{ .Values.concurrency.maxBatchRequests | quote }}
            - name: USD_PER_1K_TOKENS
              value: {{ .Values.cost.usdPer1kTokens | quote }}
            - name: COST_CURRENCY
              value: {{ .Values.cost.currency | quote }}
            - name: RESPONSE_CACHE_ENABLED
              value: {{ .Values.responseCache.enabled | quote }}
            - name: RESPONSE_CACHE_TTL_SECONDS
              value: {{ .Values.responseCache.ttlSeconds | quote }}
            - name: RESPONSE_CACHE_MAX_ENTRIES
              value: {{ .Values.responseCache.maxEntries | quote }}
            - name: RESPONSE_CACHE_BACKEND
              value: {{ .Values.responseCache.backend | quote }}
            - name: RESPONSE_CACHE_REDIS_URL
              value: {{ .Values.responseCache.redisUrl | quote }}
            - name: RESPONSE_CACHE_REDIS_TIMEOUT_SECONDS
              value: {{ .Values.responseCache.redisTimeoutSeconds | quote }}
            - name: RESPONSE_CACHE_KEY_PREFIX
              value: {{ .Values.responseCache.keyPrefix | quote }}
            - name: PROMPT_SECRET_DETECTION_ENABLED
              value: {{ .Values.guardrails.promptSecretDetection.enabled | quote }}
            - name: PROMPT_SECRET_MODE
              value: {{ .Values.guardrails.promptSecretDetection.mode | quote }}
            - name: PROMPT_SECRET_PATTERNS
              value: {{ join "," .Values.guardrails.promptSecretDetection.patterns | quote }}
            - name: BLOCKED_CONTENT_TERMS
              value: {{ join "," .Values.guardrails.blockedContentTerms | quote }}
            - name: OUTPUT_GUARDRAIL_ENABLED
              value: {{ .Values.guardrails.outputGuardrail.enabled | quote }}
            - name: OUTPUT_GUARDRAIL_MODE
              value: {{ .Values.guardrails.outputGuardrail.mode | quote }}
            - name: OUTPUT_GUARDRAIL_PATTERNS
              value: {{ join "," .Values.guardrails.outputGuardrail.patterns | quote }}
            - name: SANDBOX_BUDGET_ENABLED
              value: {{ .Values.budget.enabled | quote }}
            - name: SANDBOX_BUDGET_BACKEND
              value: {{ .Values.budget.backend | quote }}
            - name: SANDBOX_REQUEST_BUDGET
              value: {{ .Values.budget.requestLimit | quote }}
            - name: SANDBOX_PROMPT_CHAR_BUDGET
              value: {{ .Values.budget.promptCharLimit | quote }}
            - name: SANDBOX_ESTIMATED_TOKEN_BUDGET
              value: {{ .Values.budget.estimatedTokenLimit | quote }}
            - name: BUDGET_ESTIMATED_CHARS_PER_TOKEN
              value: {{ .Values.budget.estimatedCharsPerToken | quote }}
            - name: SANDBOX_BUDGET_WINDOW_SECONDS
              value: {{ .Values.budget.windowSeconds | quote }}
            - name: SANDBOX_BUDGET_REDIS_URL
              value: {{ .Values.budget.redisUrl | quote }}
            - name: SANDBOX_BUDGET_REDIS_TIMEOUT_SECONDS
              value: {{ .Values.budget.redisTimeoutSeconds | quote }}
            - name: SANDBOX_BUDGET_KEY_PREFIX
              value: {{ .Values.budget.keyPrefix | quote }}
            - name: AUDIT_LOG_ENABLED
              value: {{ .Values.traceability.auditLogEnabled | quote }}
            - name: DEFAULT_SANDBOX_ID
              value: {{ .Values.traceability.defaultSandboxId | quote }}
            - name: API_KEY_AUTH_ENABLED
              value: {{ .Values.auth.enabled | quote }}
            - name: API_KEY_HEADER
              value: {{ .Values.auth.apiKeyHeader | quote }}
            - name: JWT_AUTH_ENABLED
              value: {{ .Values.auth.jwt.enabled | quote }}
            - name: JWT_JWKS_URL
              value: {{ .Values.auth.jwt.jwksUrl | quote }}
            - name: JWT_ISSUER
              value: {{ .Values.auth.jwt.issuer | quote }}
            - name: JWT_AUDIENCE
              value: {{ .Values.auth.jwt.audience | quote }}
            - name: JWT_REQUIRED_SCOPES
              value: {{ join "," .Values.auth.jwt.requiredScopes | quote }}
            - name: JWT_CACHE_SECONDS
              value: {{ .Values.auth.jwt.cacheSeconds | quote }}
            - name: JWT_TENANT_CLAIM
              value: {{ .Values.auth.jwt.tenantClaim | quote }}
            - name: API_KEY_SHA256S
              {{- if .Values.auth.existingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret.name | quote }}
                  key: {{ .Values.auth.existingSecret.key | quote }}
              {{- else }}
              value: {{ join "," .Values.auth.apiKeyHashes | quote }}
              {{- end }}
            - name: API_KEY_RECORDS_PATH
              {{- if .Values.auth.keyRecords.existingSecret.name }}
              value: {{ printf "%s/%s" .Values.auth.keyRecords.mountPath .Values.auth.keyRecords.existingSecret.key | quote }}
              {{- else }}
              value: {{ .Values.auth.keyRecordsPath | quote }}
              {{- end }}
            - name: OTEL_TRACING_ENABLED
              value: {{ .Values.observability.tracing.enabled | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.tracing.otlpEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.tracing.serviceName | quote }}
            - name: BATCH_API_ENABLED
              value: {{ .Values.batch.enabled | quote }}
            - name: BATCH_OBJECT_STORE_BACKEND
              value: {{ .Values.batch.objectStore.backend | quote }}
            - name: BATCH_OBJECT_STORE_ROOT
              value: {{ .Values.batch.objectStore.root | quote }}
            - name: BATCH_S3_ENDPOINT_URL
              value: {{ .Values.batch.objectStore.s3.endpointUrl | quote }}
            - name: BATCH_S3_BUCKET
              value: {{ .Values.batch.objectStore.s3.bucket | quote }}
            - name: BATCH_S3_REGION
              value: {{ .Values.batch.objectStore.s3.region | quote }}
            - name: BATCH_S3_ACCESS_KEY_ID
              value: {{ .Values.batch.objectStore.s3.accessKeyId | quote }}
            - name: BATCH_S3_SECRET_ACCESS_KEY
              {{- if .Values.batch.objectStore.s3.existingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.batch.objectStore.s3.existingSecret.name | quote }}
                  key: {{ .Values.batch.objectStore.s3.existingSecret.key | quote }}
              {{- else }}
              value: {{ .Values.batch.objectStore.s3.secretAccessKey | quote }}
              {{- end }}
            - name: BATCH_STORE_BACKEND
              value: {{ .Values.batch.store.backend | quote }}
            - name: BATCH_REDIS_URL
              value: {{ .Values.batch.store.redisUrl | quote }}
            - name: BATCH_REDIS_TIMEOUT_SECONDS
              value: {{ .Values.batch.store.redisTimeoutSeconds | quote }}
            - name: BATCH_KEY_PREFIX
              value: {{ .Values.batch.store.keyPrefix | quote }}
            - name: BATCH_MAX_FILE_BYTES
              value: {{ .Values.batch.maxFileBytes | int64 | quote }}
            - name: BATCH_MAX_REQUESTS_PER_BATCH
              value: {{ .Values.batch.maxRequestsPerBatch | quote }}
            - name: BATCH_COMPLETION_WINDOW
              value: {{ .Values.batch.completionWindow | quote }}
            - name: BATCH_RETENTION_SECONDS
              value: {{ .Values.batch.retentionSeconds | quote }}
            - name: RESPONSES_STORE_ENABLED
              value: {{ .Values.responses.store.enabled | quote }}
            - name: RESPONSES_STORE_BACKEND
              value: {{ .Values.responses.store.backend | quote }}
            - name: RESPONSES_REDIS_URL
              value: {{ .Values.responses.store.redisUrl | quote }}
            - name: RESPONSES_REDIS_TIMEOUT_SECONDS
              value: {{ .Values.responses.store.redisTimeoutSeconds | quote }}
            - name: RESPONSES_KEY_PREFIX
              value: {{ .Values.responses.store.keyPrefix | quote }}
            - name: RESPONSES_RETENTION_SECONDS
              value: {{ .Values.responses.store.retentionSeconds | quote }}
            - name: ADMIN_CONSOLE_ENABLED
              value: {{ .Values.adminConsole.enabled | quote }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            # /readyz may loop over configured backends, so keep the timeout below periodSeconds.
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          {{- if or .Values.routing.policy.enabled .Values.sandboxPolicy.policy.enabled .Values.auth.keyRecords.existingSecret.name }}
          volumeMounts:
            {{- if or .Values.routing.policy.enabled .Values.sandboxPolicy.policy.enabled }}
            - name: gateway-policies
              mountPath: /etc/private-ai-platform-kit
              readOnly: true
            {{- end }}
            {{- if .Values.auth.keyRecords.existingSecret.name }}
            - name: gateway-key-records
              mountPath: {{ .Values.auth.keyRecords.mountPath | quote }}
              readOnly: true
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if or .Values.routing.policy.enabled .Values.sandboxPolicy.policy.enabled .Values.auth.keyRecords.existingSecret.name }}
      volumes:
        {{- if or .Values.routing.policy.enabled .Values.sandboxPolicy.policy.enabled }}
        - name: gateway-policies
          configMap:
            name: {{ include "inference-gateway.fullname" . }}-policies
        {{- end }}
        {{- if .Values.auth.keyRecords.existingSecret.name }}
        - name: gateway-key-records
          secret:
            secretName: {{ .Values.auth.keyRecords.existingSecret.name | quote }}
        {{- end }}
      {{- end }}
