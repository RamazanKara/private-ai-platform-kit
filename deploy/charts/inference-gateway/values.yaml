replicaCount: 1

image:
  repository: ghcr.io/ramazankara/private-ai-platform-kit/inference-gateway
  # First-party image: release CI pins the published digest (set image.digest) after build.
  tag: "v0.14.0"
  pullPolicy: IfNotPresent

runtime:
  backend: ollama
  modelId: qwen3.5:0.8b
  ollamaBaseUrl: http://ollama.ollama.svc.cluster.local:11434
  vllmBaseUrl: http://vllm.vllm.svc.cluster.local:8000
  requestTimeoutSeconds: "120"
  maxRetries: 2
  retryBackoffSeconds: "0.1"
  circuitFailureThreshold: 0
  circuitResetSeconds: "30"
  allowedModels:
    - qwen3.5:0.8b

routing:
  policyPath: ""
  policy:
    enabled: false
    models: []

sandboxPolicy:
  policyPath: ""
  policy:
    enabled: false
    policies: []

admission:
  maxMessages: 16
  maxPromptChars: 8192
  maxCompletionTokens: 1024
  maxTools: 64
  maxToolChars: 32768
  allowStreaming: false

# Short-window per-sandbox request throttle (distinct from the cumulative budget).
# Uses the same backend as budgets (budget.backend); 0 requests means unlimited.
# Disabled by default.
rateLimit:
  enabled: false
  requestsPerWindow: 0
  windowSeconds: 60

# Bounded in-flight concurrency: requests beyond the limit are shed with 503 (not
# queued). 0 disables the limit.
concurrency:
  maxConcurrentRequests: 0
  # Maximum chat requests accepted in one POST /v1/batches call.
  maxBatchRequests: 32

# Exact-match per-sandbox response cache for non-streaming chat completions.
# backend: "memory" (per-replica) or "redis" (shared across replicas; recommended under
# horizontal scale-out so the hit rate does not collapse as the gateway scales).
responseCache:
  enabled: false
  ttlSeconds: 60
  maxEntries: 1024
  backend: memory
  redisUrl: redis://budget-redis.budget.svc.cluster.local:6379/1
  redisTimeoutSeconds: "0.5"
  keyPrefix: private-ai-platform-kit:response-cache

# Token-to-cost model surfaced by GET /v1/usage. 0 disables the cost estimate.
cost:
  usdPer1kTokens: 0
  currency: USD

guardrails:
  promptSecretDetection:
    enabled: true
    # Built-in detectors applied to prompt/embedding input. Credential detectors are
    # the default; add the PII detectors (email, us_ssn, credit_card) to reject PII.
    patterns:
      - private_key
      - github_token
      - slack_token
      - bearer_token
      - generic_api_key_assignment
  # Case-insensitive substrings rejected anywhere in input (e.g. project codenames).
  # Empty disables the denylist.
  blockedContentTerms: []
  # Output-side guardrail: inspect the model completion before returning it (OWASP LLM02
  # insecure output handling / LLM06 sensitive-information disclosure). mode: "flag"
  # (record only), "redact" (replace matched spans), or "block" (withhold content and set
  # finish_reason=content_filter). Scans the credential + PII detectors plus blockedContentTerms.
  # Disabled by default. Streaming responses are detected-and-flagged only (bytes are already
  # in flight); use non-streaming for redact/block enforcement.
  outputGuardrail:
    enabled: false
    mode: redact
    patterns:
      - private_key
      - github_token
      - slack_token
      - bearer_token
      - generic_api_key_assignment
      - email
      - us_ssn
      - credit_card

budget:
  enabled: true
  backend: memory
  requestLimit: 1000
  promptCharLimit: "2000000"
  estimatedTokenLimit: 750000
  estimatedCharsPerToken: 4
  windowSeconds: 86400
  redisUrl: redis://budget-redis.budget.svc.cluster.local:6379/0
  redisTimeoutSeconds: "0.5"
  keyPrefix: private-ai-platform-kit:sandbox-budget

traceability:
  auditLogEnabled: true
  defaultSandboxId: local-lab

auth:
  enabled: false
  apiKeyHeader: X-API-Key
  apiKeyHashes: []
  existingSecret:
    name: ""
    key: api-key-sha256s
  jwt:
    enabled: false
    jwksUrl: ""
    issuer: ""
    audience: ""
    requiredScopes: []
    cacheSeconds: 300
    # When set, the named JWT claim binds the sandbox id: a mismatched or missing
    # X-Sandbox-ID is rejected so per-sandbox budget/policy/attribution cannot be
    # spoofed via the client header. Empty disables binding (header-trusted).
    tenantClaim: ""

service:
  port: 8080

# Optional Ingress for cluster-external clients. Disabled by default (port-forward only).
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
  tls:
    enabled: false
    secretName: ""

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: local
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: local-lab

serviceMonitor:
  enabled: true
  interval: 30s

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

networkPolicy:
  enabled: true
  # monitoring must stay listed: the Prometheus scrape (ServiceMonitor) and the KEDA
  # scaler's query source both go dark on a NetworkPolicy-enforcing CNI without it.
  allowedIngressNamespaces:
    - ai-agents
    - ai-sandbox
    - monitoring
  allowedIngressNamespaceLabels:
    - platform.ai/traceable-sandbox: "true"
  runtimeEgress:
    - namespace: ollama
      port: 11434
    - namespace: vllm
      port: 8000
    - namespace: budget
      port: 6379
  allowDns: true

keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 5
  prometheusServerAddress: http://kube-prometheus-stack-prometheus.monitoring:9090
  threshold: "10"

observability:
  tracing:
    enabled: false
    otlpEndpoint: ""
    serviceName: inference-gateway

# `helm test` connection probe. Rendered for validation; only created by `helm test`.
tests:
  enabled: true
  image:
    repository: busybox
    # tag is kept as documentation; digest pins the multi-arch manifest list.
    tag: "1.37.0"
    digest: "sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028"

# Data-plane namespace with an apiserver-native Pod Security Admission restricted floor.
# create=false when the namespace is managed elsewhere; name defaults to the release namespace.
namespace:
  create: true
  name: ""
