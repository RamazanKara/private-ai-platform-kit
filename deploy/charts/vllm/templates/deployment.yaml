apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm.fullname" . }}
  labels:
    {{- include "vllm.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vllm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vllm.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vllm.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        runAsNonRoot: true
        # The vllm/vllm-openai image ships no USER directive (defaults to root),
        # so an explicit non-root UID/GID is required or the kubelet rejects the
        # pod ("container has runAsNonRoot and image will run as root").
        runAsUser: {{ .Values.podSecurityContext.runAsUser }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup }}
        # fsGroup makes the emptyDir model-cache/tmp volumes group-writable by the
        # non-root UID so HF_HOME/VLLM_CACHE_ROOT downloads succeed.
        fsGroup: {{ .Values.podSecurityContext.fsGroup }}
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.accelerator.runtimeClassName }}
      runtimeClassName: {{ .Values.accelerator.runtimeClassName | quote }}
      {{- end }}
      {{- if .Values.accelerator.enabled }}
      nodeSelector:
        {{- toYaml .Values.accelerator.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.accelerator.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpread.maxSkew }}
          topologyKey: {{ .Values.topologySpread.topologyKey | quote }}
          whenUnsatisfiable: {{ .Values.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "vllm.selectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: vllm
          image: {{ include "vllm.image" .Values.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --model
            - {{ .Values.model.name | quote }}
            {{- if .Values.model.revision }}
            - --revision
            - {{ .Values.model.revision | quote }}
            {{- end }}
            - --dtype
            - {{ .Values.model.dtype | quote }}
            - --max-model-len
            - {{ .Values.model.maxModelLen | quote }}
            {{- if .Values.server }}
            {{- if .Values.server.enablePrefixCaching }}
            - --enable-prefix-caching
            {{- else }}
            - --no-enable-prefix-caching
            {{- end }}
            {{- if .Values.server.gpuMemoryUtilization }}
            - --gpu-memory-utilization
            - {{ .Values.server.gpuMemoryUtilization | quote }}
            {{- end }}
            {{- if .Values.server.kvCacheDtype }}
            - --kv-cache-dtype
            - {{ .Values.server.kvCacheDtype | quote }}
            {{- end }}
            {{- if .Values.server.quantization }}
            - --quantization
            - {{ .Values.server.quantization | quote }}
            {{- end }}
            {{- if .Values.server.guidedDecodingBackend }}
            - --guided-decoding-backend
            - {{ .Values.server.guidedDecodingBackend | quote }}
            {{- end }}
            {{- if and .Values.server.speculative .Values.server.speculative.enabled .Values.server.speculative.config }}
            - --speculative-config
            - {{ .Values.server.speculative.config | quote }}
            {{- end }}
            {{- end }}
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- if .Values.externalSecrets.enabled }}
          env:
            - name: HF_HOME
              value: {{ .Values.cache.mountPath | quote }}
            - name: TRANSFORMERS_CACHE
              value: {{ .Values.cache.mountPath | quote }}
            - name: VLLM_CACHE_ROOT
              value: {{ .Values.cache.mountPath | quote }}
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.huggingFaceTokenSecretName }}
                  key: {{ .Values.externalSecrets.huggingFaceTokenKey }}
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- else if .Values.extraEnv }}
          env:
            - name: HF_HOME
              value: {{ .Values.cache.mountPath | quote }}
            - name: TRANSFORMERS_CACHE
              value: {{ .Values.cache.mountPath | quote }}
            - name: VLLM_CACHE_ROOT
              value: {{ .Values.cache.mountPath | quote }}
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- else }}
          env:
            - name: HF_HOME
              value: {{ .Values.cache.mountPath | quote }}
            - name: TRANSFORMERS_CACHE
              value: {{ .Values.cache.mountPath | quote }}
            - name: VLLM_CACHE_ROOT
              value: {{ .Values.cache.mountPath | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
          {{- if .Values.startupProbe.enabled }}
          # Guards the multi-minute model load: liveness/readiness do not start
          # failing until the startup probe first succeeds. failureThreshold x
          # periodSeconds must exceed the worst-case weight download + load time.
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
              {{- if .Values.accelerator.enabled }}
              {{ .Values.accelerator.resourceName }}: {{ .Values.accelerator.count }}
              {{- end }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
              {{- if .Values.accelerator.enabled }}
              {{ .Values.accelerator.resourceName }}: {{ .Values.accelerator.count }}
              {{- end }}
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.cache.mountPath | quote }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: model-cache
          {{- if .Values.cache.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "vllm.fullname" . }}-model-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
