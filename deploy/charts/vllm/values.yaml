replicaCount: 1

image:
  repository: vllm/vllm-openai
  # tag is kept as documentation; digest pins the multi-arch manifest list.
  tag: "v0.22.0"
  digest: "sha256:0fec7ec5f3e6bc168e54899935fb0557da908a4832a1dbc88e2debcf2f889416"
  pullPolicy: IfNotPresent

model:
  name: Qwen/Qwen3-Coder-Next
  # Pin the Hugging Face revision (commit SHA preferred, or an immutable tag) so the
  # served artifact cannot drift from the mutable default branch. Set this to the
  # revision attested in platform/governance/model-provenance.yaml (immutableRef).
  # Empty tracks the default branch (not recommended for production).
  revision: ""
  dtype: auto
  maxModelLen: "262144"

# Additional vLLM CLI flags. The generic passthrough already covers single-node
# tensor-parallel (`--tensor-parallel-size`, set in the GPU profiles), LoRA serving
# (`--enable-lora` / `--lora-modules`), and the tool-call parser. Multi-NODE distributed
# serving and adapter lifecycle governance are tracked as larger efforts in ROADMAP.md.

cache:
  mountPath: /models
  # Persist the model weights so they survive pod restarts and KEDA scale-up instead
  # of re-downloading the full 100+ GB model into an emptyDir on every cold start
  # (the long startup probe exists only to mask that re-download). Multi-replica
  # sharing needs a ReadWriteMany storage class; with ReadWriteOnce keep replicaCount
  # at 1 or pre-bake the weights into the image. Disabled by default to preserve the
  # zero-dependency local behavior.
  persistence:
    enabled: false
    size: 200Gi
    storageClassName: ""
    accessMode: ReadWriteOnce

service:
  port: 8000

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

accelerator:
  enabled: true
  vendor: nvidia
  resourceName: nvidia.com/gpu
  count: 4
  runtimeClassName: ""
  nodeSelector:
    platform.ai/node-pool: gpu
    platform.ai/gpu-vendor: nvidia
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# CPU-based HorizontalPodAutoscaler. NOTE: CPU% is the WRONG signal for a GPU
# server -- vLLM is frequently GPU-bound while CPU stays low, so this never
# scales when it should and is only a placeholder fallback. Prefer the queue-
# based KEDA autoscaler below (keda.enabled). When keda.enabled is true this
# CPU HPA is suppressed (the two are mutually exclusive; KEDA wins).
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

# Queue-depth autoscaling via KEDA (preferred for GPU runtimes). Scales on the
# vLLM request-queue gauge `vllm:num_requests_waiting` (a real backlog signal)
# instead of CPU%. Requires the KEDA operator and a Prometheus scraping vLLM
# metrics (the bundled ServiceMonitor). Disabled by default because it is
# environment-specific (operator + Prometheus address); enable per cluster.
keda:
  enabled: false
  # Set minReplicaCount to 0 to scale the GPU runtime to zero when the request queue is
  # idle (KEDA activates a replica on the first queued request). Costly cold starts make
  # this best paired with the persistent model-weight cache (cache.persistence).
  minReplicaCount: 1
  maxReplicaCount: 4
  # Scale up once this many requests are queued (waiting, not running) per replica.
  threshold: "5"
  prometheusServerAddress: http://kube-prometheus-stack-prometheus.monitoring:9090
  # Average queue depth across all vLLM replicas. KEDA divides the result by
  # threshold to compute the desired replica count.
  query: 'avg(vllm:num_requests_waiting)'
  # Seconds to wait after the last trigger before scaling back down. Generous so
  # a multi-GPU pod with a multi-minute model load is not churned needlessly.
  cooldownPeriod: 300

# Startup probe covers the multi-minute model weight download + load. Liveness
# and readiness checks do not begin until it first succeeds, so a slow cold
# start is not mistaken for a crash. failureThreshold x periodSeconds is the
# total grace window (default 60 x 10s = 10 minutes).
startupProbe:
  enabled: true
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 60

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

# Steady-state liveness probe: restarts the container if /health stops
# responding after startup. failureThreshold is kept lenient so a transient
# stall under heavy GPU load does not trigger a needless restart.
livenessProbe:
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

# Pod-level security context. The vllm/vllm-openai image ships no USER (runs as
# root by default), so with runAsNonRoot an explicit non-root UID/GID is
# mandatory. fsGroup makes the emptyDir model-cache and /tmp volumes writable by
# this UID for HF_HOME / VLLM_CACHE_ROOT.
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

resources:
  requests:
    cpu: "2"
    memory: 32Gi
  limits:
    cpu: "4"
    memory: 64Gi

podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: local
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: local-lab

serviceMonitor:
  enabled: true
  interval: 30s

externalSecrets:
  enabled: false
  huggingFaceTokenSecretName: hf-token
  huggingFaceTokenKey: token

extraEnv: []
extraArgs:
  - --tensor-parallel-size
  - "4"
  - --enable-auto-tool-choice
  - --tool-call-parser
  - qwen3_coder
