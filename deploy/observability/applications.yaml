apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 66.2.1
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          defaultDashboardsTimezone: utc
          # Wire the Tempo trace backend as a Grafana datasource so the OTLP spans the
          # gateway and RAG service export (OTEL_TRACING_ENABLED) are queryable end-to-end.
          additionalDataSources:
            - name: Tempo
              type: tempo
              uid: tempo
              access: proxy
              url: http://tempo.monitoring.svc.cluster.local:3200
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
        # Default Alertmanager routing tree. Non-critical alerts fall through to the null
        # receiver; critical alerts route to the platform-oncall webhook receiver, which
        # ships as a working end-to-end example. Replace the placeholder webhook URL with a
        # real destination (Slack/PagerDuty/Opsgenie/webhook) per environment; the URL and
        # any secret are a customer/IdP responsibility per the kit boundary.
        alertmanager:
          config:
            route:
              receiver: "null"
              group_by: ["alertname", "severity"]
              routes:
                - matchers: ['severity = "critical"']
                  receiver: platform-oncall
                  continue: true
            receivers:
              - name: "null"
              - name: platform-oncall
                webhook_configs:
                    # Replace with your real receiver (e.g. a Slack/PagerDuty webhook proxy).
                  - url: https://alerts.example.invalid/platform-oncall
                    send_resolved: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Tempo trace backend. Receives the OTLP/HTTP spans exported by the gateway and RAG service
# (set observability.tracing.otlpEndpoint to http://tempo.monitoring.svc.cluster.local:4318
# in the customer overlays) and is wired as a Grafana datasource above, so request / RAG /
# runtime latency is debuggable end-to-end instead of the instrumentation exporting to nowhere.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: 1.23.3
    helm:
      releaseName: tempo
      values: |
        tempo:
          metricsGenerator:
            enabled: false
        # SingleBinary Tempo with the OTLP receiver enabled (gRPC 4317, HTTP 4318).
        # Local/reference footprint; size retention and storage per environment.
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.24.0
    helm:
      releaseName: loki
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
        singleBinary:
          replicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Promtail ships pod stdout (including the gateway/RAG redacted audit JSON) into Loki.
# Without a collector, Loki stays empty and the audit trail is lost on pod restart.
# Confirm the push URL matches this cluster's Loki service if it differs from the default.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: 6.16.6
    helm:
      releaseName: promtail
      values: |
        config:
          clients:
            - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-pushgateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus-pushgateway
    targetRevision: 2.15.0
    helm:
      releaseName: pushgateway
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

