apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: private-ai-platform-kit-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: ai-platform-alerts
    app.kubernetes.io/part-of: private-ai-platform-kit
spec:
  groups:
    - name: inference.rules
      rules:
        - alert: InferenceGatewayHighErrorRate
          expr: |
            sum(rate(inference_gateway_requests_total{route="/v1/chat/completions",status!="200"}[5m]))
            /
            clamp_min(sum(rate(inference_gateway_requests_total{route="/v1/chat/completions"}[5m])), 1)
            > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Inference gateway error rate is above 5 percent.
            runbook_url: runbooks/incident-inference-runtime.md
        - alert: InferenceGatewayErrorBudgetFastBurn
          expr: |
            (
              sum(rate(inference_gateway_requests_total{route="/v1/chat/completions",status!="200"}[5m]))
              /
              clamp_min(sum(rate(inference_gateway_requests_total{route="/v1/chat/completions"}[5m])), 1)
            ) > 0.072
            and
            (
              sum(rate(inference_gateway_requests_total{route="/v1/chat/completions",status!="200"}[1h]))
              /
              clamp_min(sum(rate(inference_gateway_requests_total{route="/v1/chat/completions"}[1h])), 1)
            ) > 0.072
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Inference gateway is burning the 99.5 percent availability error budget quickly.
            runbook_url: runbooks/incident-inference-runtime.md
        - alert: InferenceGatewayErrorBudgetSlowBurn
          expr: |
            (
              sum(rate(inference_gateway_requests_total{route="/v1/chat/completions",status!="200"}[30m]))
              /
              clamp_min(sum(rate(inference_gateway_requests_total{route="/v1/chat/completions"}[30m])), 1)
            ) > 0.015
            and
            (
              sum(rate(inference_gateway_requests_total{route="/v1/chat/completions",status!="200"}[6h]))
              /
              clamp_min(sum(rate(inference_gateway_requests_total{route="/v1/chat/completions"}[6h])), 1)
            ) > 0.015
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: Inference gateway is steadily burning the 99.5 percent availability error budget.
            runbook_url: runbooks/incident-inference-runtime.md
        - alert: InferenceGatewayHighLatency
          expr: histogram_quantile(0.95, sum(rate(inference_gateway_request_duration_seconds_bucket[5m])) by (le)) > 10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Inference gateway p95 latency is above 10 seconds.
            runbook_url: runbooks/incident-inference-runtime.md
        - alert: InferenceGatewaySandboxErrors
          expr: |
            sum(rate(inference_gateway_sandbox_requests_total{status!="200"}[5m])) by (sandbox)
            /
            clamp_min(sum(rate(inference_gateway_sandbox_requests_total[5m])) by (sandbox), 1)
            > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: A traceable sandbox has an inference gateway error rate above 5 percent.
            runbook_url: runbooks/incident-inference-runtime.md
        - alert: InferenceGatewayAdmissionRejections
          expr: sum(rate(inference_gateway_admission_rejections_total[5m])) by (sandbox, reason) > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: A sandbox is sending requests rejected by gateway admission policy.
            runbook_url: runbooks/budget-controls.md
        - alert: InferenceGatewaySandboxBudgetNearLimit
          expr: |
            (
              inference_gateway_sandbox_budget_usage
              /
              clamp_min(inference_gateway_sandbox_budget_limit, 1)
            ) > 0.8
            and inference_gateway_sandbox_budget_limit > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: A sandbox is above 80 percent of a configured gateway budget.
            runbook_url: runbooks/budget-controls.md
        - alert: InferenceRuntimeBackendAbsent
          expr: sum(up{job=~"vllm|ollama"}) == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: No inference runtime backend (vLLM or Ollama) is reporting up; see runbooks/incident-inference-runtime.md.
            runbook_url: runbooks/incident-inference-runtime.md
        - alert: VllmRuntimeAbsent
          expr: absent(up{job="vllm"})
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: The vLLM GPU runtime backend has no scrape target reporting up; follow runbooks/incident-inference-runtime.md and runbooks/gpu-capacity.md.
            runbook_url: runbooks/incident-inference-runtime.md
        - alert: OllamaRuntimeAbsent
          expr: absent(up{job="ollama"})
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: The Ollama runtime backend has no scrape target reporting up; follow runbooks/incident-inference-runtime.md.
            runbook_url: runbooks/incident-inference-runtime.md
        - alert: InferenceGatewayNoReadyEndpoints
          expr: |
            max(
              kube_deployment_status_replicas_available{deployment=~".*inference-gateway.*"}
            ) == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: The inference gateway has zero ready endpoints; clients cannot reach any runtime. See runbooks/incident-inference-runtime.md.
            runbook_url: runbooks/incident-inference-runtime.md
        - alert: RestoreDrillFailed
          expr: restore_drill_validation_passed == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Latest restore-drill validation failed.
            runbook_url: runbooks/restore-drill.md
        - alert: RestoreDrillStale
          expr: time() - restore_drill_last_success_timestamp > 93600
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: No successful restore drill has completed in the last 26 hours.
            runbook_url: runbooks/restore-drill.md
    - name: backup.rules
      rules:
        - alert: VeleroBackupFailed
          expr: |
            increase(velero_backup_failure_total[1h]) > 0
            or increase(velero_backup_partial_failure_total[1h]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: A scheduled Velero backup has failed or partially failed.
            runbook_url: runbooks/restore-drill.md
        - alert: VeleroBackupStale
          expr: time() - max(velero_backup_last_successful_timestamp) by (schedule) > 93600
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: No successful Velero backup has completed in the last 26 hours.
            runbook_url: runbooks/restore-drill.md
    - name: rag.rules
      rules:
        - alert: RagServiceHighErrorRate
          expr: |
            sum(rate(rag_service_requests_total{route="/v1/rag/query",status!="200"}[5m]))
            /
            clamp_min(sum(rate(rag_service_requests_total{route="/v1/rag/query"}[5m])), 1)
            > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: RAG service query error rate is above 5 percent.
            runbook_url: runbooks/rag-service.md
        - alert: RagServiceHighLatency
          expr: histogram_quantile(0.95, sum(rate(rag_service_request_duration_seconds_bucket[5m])) by (le)) > 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: RAG service p95 latency is above 1 second.
            runbook_url: runbooks/rag-service.md
    - name: gpu.rules
      rules:
        # Queue backlog is the real GPU-saturation signal (also drives KEDA scaling): a
        # sustained request queue means the GPU fleet is under-provisioned for demand.
        - alert: VllmRequestQueueBacklog
          expr: avg(vllm:num_requests_waiting) > 10
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: vLLM has a sustained request-queue backlog; the GPU fleet may be under-provisioned.
            runbook_url: runbooks/gpu-capacity.md
        # DCGM exporter metrics (NVIDIA). These do not fire when DCGM is not deployed.
        - alert: GpuHighUtilization
          expr: avg by (instance) (DCGM_FI_DEV_GPU_UTIL) > 95
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: A GPU has been above 95 percent utilization for 15 minutes.
            runbook_url: runbooks/gpu-capacity.md
        - alert: GpuMemoryNearCapacity
          expr: |
            DCGM_FI_DEV_FB_USED
            /
            clamp_min(DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE, 1)
            > 0.95
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: GPU framebuffer memory is above 95 percent of capacity.
            runbook_url: runbooks/gpu-capacity.md
    - name: inference.recording
      rules:
        # Pre-aggregated SLIs so dashboards and burn-rate panels do not recompute the
        # error ratio and latency quantile on every query.
        - record: job:inference_gateway_request_error_ratio:rate5m
          expr: |
            sum(rate(inference_gateway_requests_total{route="/v1/chat/completions",status!="200"}[5m]))
            /
            clamp_min(sum(rate(inference_gateway_requests_total{route="/v1/chat/completions"}[5m])), 1)
        - record: job:inference_gateway_request_latency:p95_5m
          expr: histogram_quantile(0.95, sum(rate(inference_gateway_request_duration_seconds_bucket[5m])) by (le))
        - record: job:rag_service_request_error_ratio:rate5m
          expr: |
            sum(rate(rag_service_requests_total{route="/v1/rag/query",status!="200"}[5m]))
            /
            clamp_min(sum(rate(rag_service_requests_total{route="/v1/rag/query"}[5m])), 1)
