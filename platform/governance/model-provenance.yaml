apiVersion: platform.ai/v1alpha1
kind: ModelProvenanceSet
metadata:
  name: private-ai-platform-kit-model-provenance
spec:
  description: Reviewed model artifact provenance for approved local and customer lab models.
  requiredEvidence:
    - sourceUri
    - immutableRef
    - digest
    - license
    - dataClassification
    - riskTier
    - promotionRequest
    - servingProfiles
  artifacts:
    - modelId: qwen2.5:0.5b
      status: approved
      source: ollama-library
      sourceUri: ollama://qwen2.5:0.5b
      immutableRef: ollama-library/qwen2.5:0.5b@sha256:c5396e06af294bd101b30dce59131a76d2b773e76950acc870eda801d3ab0515
      digest:
        algorithm: sha256
        value: c5396e06af294bd101b30dce59131a76d2b773e76950acc870eda801d3ab0515
        scope: model-artifact
        verificationMode: ollama-registry-model-layer
        verificationCommand: >-
          curl -fsSL https://registry.ollama.ai/v2/library/qwen2.5/manifests/0.5b |
          jq -r '.layers[] | select(.mediaType=="application/vnd.ollama.image.model").digest'
      license: apache-2.0
      dataClassification: internal
      riskTier: low
      promotionRequest: platform/model-catalog/promotion-requests/qwen2.5-local-lab-approved.yaml
      catalogRef: platform/model-catalog/models.yaml
      servingProfiles:
        - deploy/clusters/local/values/ollama.yaml
        - deploy/clusters/local/values/inference-gateway.yaml
      evidenceRefs:
        evalSummary: results/evals/sample-summary.md
        loadTestSummary: results/loadtest/sample-summary.md
        securityWorkflow: .github/workflows/ci.yml
      notes: Source digest is the Ollama registry model-weights layer (reproducible via verificationCommand). Re-verify against your own model store before production use.
    - modelId: qwen3.5:0.8b
      status: approved
      source: ollama-library
      sourceUri: ollama://qwen3.5:0.8b
      immutableRef: ollama-library/qwen3.5:0.8b@sha256:afb707b6b8fac6e475acc42bc8380fc0b8d2e0e4190be5a969fbf62fcc897db5
      digest:
        algorithm: sha256
        value: afb707b6b8fac6e475acc42bc8380fc0b8d2e0e4190be5a969fbf62fcc897db5
        scope: model-artifact
        verificationMode: ollama-registry-model-layer
        verificationCommand: >-
          curl -fsSL https://registry.ollama.ai/v2/library/qwen3.5/manifests/0.8b |
          jq -r '.layers[] | select(.mediaType=="application/vnd.ollama.image.model").digest'
      license: apache-2.0
      dataClassification: internal
      riskTier: low
      promotionRequest: platform/model-catalog/promotion-requests/qwen3.5-customer-lab-approved.yaml
      catalogRef: platform/model-catalog/models.yaml
      servingProfiles:
        - deploy/clusters/customer/values/ollama.yaml
        - deploy/clusters/customer/values/inference-gateway.yaml
      evidenceRefs:
        evalSummary: results/evals/sample-summary.md
        loadTestSummary: results/loadtest/sample-summary.md
        securityWorkflow: .github/workflows/ci.yml
      notes: Source digest is the Ollama registry model-weights layer (reproducible via verificationCommand). Re-verify against your own model store before production use.
    - modelId: Qwen/Qwen3-Coder-Next
      status: approved
      source: huggingface
      sourceUri: https://huggingface.co/Qwen/Qwen3-Coder-Next
      # Pin to a specific Hugging Face commit before production; this scope is a source
      # pointer the customer replaces with their own pinned model-store revision + checksum.
      revision: main
      immutableRef: huggingface://Qwen/Qwen3-Coder-Next@sha256:71b3fd269cc80811780298417132e23cc6272e7fea40c36733c6caffa6e1ee06
      digest:
        algorithm: sha256
        value: 71b3fd269cc80811780298417132e23cc6272e7fea40c36733c6caffa6e1ee06
        scope: source-reference
        verificationMode: customer-model-store
        verificationCommand: huggingface-cli scan-cache --dir /models
      license: apache-2.0
      dataClassification: internal
      riskTier: medium
      promotionRequest: platform/model-catalog/promotion-requests/qwen3-coder-customer-lab-approved.yaml
      catalogRef: platform/model-catalog/models.yaml
      servingProfiles:
        - deploy/clusters/customer/values/vllm.yaml
        - deploy/clusters/customer/values/vllm-nvidia.yaml
        - deploy/clusters/customer/values/vllm-amd.yaml
        - deploy/clusters/customer/values/inference-gateway.yaml
      evidenceRefs:
        evalSummary: results/evals/sample-summary.md
        loadTestSummary: results/loadtest/sample-summary.md
        securityWorkflow: .github/workflows/ci.yml
      notes: Customer lab vLLM coding-agent model. Replace source-reference digest with the customer's pinned model-store artifact revision and checksum.
    - modelId: BAAI/bge-small-en-v1.5
      status: approved
      source: huggingface
      sourceUri: https://huggingface.co/BAAI/bge-small-en-v1.5
      # Pin to a specific Hugging Face commit before production; this scope is a source
      # pointer the customer replaces with their own pinned model-store revision + checksum.
      revision: main
      immutableRef: huggingface://BAAI/bge-small-en-v1.5@sha256:99aab2ead8654ba801d2a01b188b13cc119e5d2d10880e8d1ee4a1315aa99e72
      digest:
        algorithm: sha256
        # Deterministic source-reference over the model reference string
        # (printf 'huggingface://BAAI/bge-small-en-v1.5' | sha256sum); the customer replaces
        # this with the pinned model-store artifact checksum before production.
        value: 99aab2ead8654ba801d2a01b188b13cc119e5d2d10880e8d1ee4a1315aa99e72
        scope: source-reference
        verificationMode: customer-model-store
        verificationCommand: huggingface-cli scan-cache --dir /models
      license: mit
      dataClassification: internal
      riskTier: low
      promotionRequest: platform/model-catalog/promotion-requests/bge-small-embedding-approved.yaml
      catalogRef: platform/model-catalog/models.yaml
      servingProfiles:
        - deploy/clusters/customer/values/inference-gateway.yaml
      evidenceRefs:
        evalSummary: results/evals/sample-summary.md
        loadTestSummary: results/loadtest/sample-summary.md
        securityWorkflow: .github/workflows/ci.yml
      notes: Reference embedding model for governed RAG retrieval, proxied through the gateway /v1/embeddings route. Replace source-reference digest with the customer's pinned model-store artifact revision and checksum.
