apiVersion: platform.ai/v1alpha1
kind: ModelCatalog
metadata:
  name: private-ai-platform-kit-models
spec:
  models:
    - id: Qwen/Qwen3-Coder-Next
      runtime: vllm
      owner: platform-team
      status: approved
      stage: customer-lab
      riskTier: medium
      dataClassification: internal
      license: apache-2.0
      source: huggingface
      accelerators:
        - nvidia
        - amd
      contextWindow: 262144
      maxPromptChars: 131072
      maxCompletionTokens: 8192
      promotionRequest: platform/model-catalog/promotion-requests/qwen3-coder-customer-lab-approved.yaml
      notes: Current Qwen3 Coder Next profile for customer GPU coding-agent clusters.
    - id: qwen2.5:0.5b
      runtime: ollama
      owner: platform-team
      status: approved
      stage: local-lab
      riskTier: low
      dataClassification: internal
      license: apache-2.0
      source: ollama-library
      accelerators:
        - cpu
      contextWindow: 32768
      maxPromptChars: 8192
      maxCompletionTokens: 1024
      promotionRequest: platform/model-catalog/promotion-requests/qwen2.5-local-lab-approved.yaml
      notes: Default local CPU smoke model; fast non-reasoning Qwen2.5 0.5B sized for laptop kind demos.
    - id: qwen3.5:0.8b
      runtime: ollama
      owner: platform-team
      status: approved
      stage: customer-lab
      riskTier: low
      dataClassification: internal
      license: apache-2.0
      source: ollama-library
      accelerators:
        - cpu
      contextWindow: 32768
      maxPromptChars: 8192
      maxCompletionTokens: 1024
      promotionRequest: platform/model-catalog/promotion-requests/qwen3.5-customer-lab-approved.yaml
      notes: Higher-quality small Qwen3.5 reasoning model for the customer Ollama profile; reasons slowly on CPU, so the local laptop profile uses qwen2.5:0.5b instead.
    # Embedding model for RAG retrieval. Retrieval-quality models are now governed in the
    # catalog like generation models (the previous asymmetry the audit flagged). 384-dim
    # matches the RAG default vector dimensions; serve via vLLM embedding mode (--task embed)
    # or a TEI sidecar, and point the RAG service at it (retrieval.embedding.provider=
    # openai-compatible). Proposed pending a real provenance digest + promotion request.
    - id: BAAI/bge-small-en-v1.5
      runtime: vllm
      owner: platform-team
      status: proposed
      stage: customer-lab
      riskTier: low
      dataClassification: internal
      license: mit
      source: huggingface
      accelerators:
        - nvidia
        - cpu
      modality: embedding
      contextWindow: 512
      maxPromptChars: 2048
      maxCompletionTokens: 1
      notes: Proposed reference embedding model (384-dim) for governed RAG retrieval; replaces the demo hashed-vector default. maxCompletionTokens is nominal (embeddings produce vectors, not completions).
    # Proposed newer models. Promote to `approved` only after capturing a real provenance
    # digest (platform/governance/model-provenance.yaml) and a promotion request, then add to the
    # relevant runtime.allowedModels. See runbooks/model-governance.md.
    - id: Qwen/Qwen3.6-35B-A3B
      runtime: vllm
      owner: platform-team
      status: proposed
      stage: customer-lab
      riskTier: medium
      dataClassification: internal
      license: apache-2.0
      source: huggingface
      accelerators:
        - nvidia
        - amd
      contextWindow: 262144
      maxPromptChars: 131072
      maxCompletionTokens: 8192
      notes: Proposed Qwen3.6 MoE (35B total / 3B active) general+coding alternative. Confirm context window before promotion.
    - id: zai-org/GLM-5.2
      runtime: vllm
      owner: platform-team
      status: proposed
      stage: customer-lab
      riskTier: medium
      dataClassification: internal
      license: mit
      source: huggingface
      accelerators:
        - nvidia
      contextWindow: 200000
      maxPromptChars: 131072
      maxCompletionTokens: 8192
      notes: Proposed GLM-5.2 MoE agentic-coding alternative (multi-GPU). Verify license and context window before promotion.
    - id: deepseek-ai/DeepSeek-V4-Flash
      runtime: vllm
      owner: platform-team
      status: proposed
      stage: customer-lab
      riskTier: medium
      dataClassification: internal
      license: mit
      source: huggingface
      accelerators:
        - nvidia
      contextWindow: 1048576
      maxPromptChars: 131072
      maxCompletionTokens: 8192
      notes: Proposed DeepSeek-V4-Flash MoE (284B total / 13B active, 1M context) alternative (multi-GPU). Verify license before promotion.
