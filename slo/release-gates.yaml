apiVersion: platform.ai/v1alpha1
kind: ReleaseGate
metadata:
  name: private-ai-platform-kit-local-release
spec:
  profile: local-customer-handoff
  description: >-
    Minimum evidence required before using the local lab for a customer demo,
    release review, restore-drill review, or production-readiness handoff. Note:
    the restore gate is satisfied by the restore-tooling smoke (synthetic Redis
    fixture) unless the real Qdrant data-recovery drill report is present.
  gates:
    eval:
      required: true
      evidence:
        - results/evals/eval-*.json
        - results/evals/sample-summary.json
      minCases: 2
      minPassRate: 1.0
      maxCaseLatencyMs: 30000
    load:
      required: true
      evidence:
        - results/loadtest/loadtest-*.json
        - results/loadtest/sample-summary.json
      minRequests: 1
      maxErrorRate: 0.05
      maxP95LatencyMs: 10000
      maxP99LatencyMs: 15000
    restore:
      # By default this gate is satisfied by the restore-tooling SMOKE (a
      # synthetic Redis AOF fixture that proves the restore pipeline runs). It
      # does NOT prove production data is recoverable until the real Qdrant
      # data-recovery drill report (qdrant-data-restore-*.json, produced by
      # RESTORE_DRILL_QDRANT_DATA=1) is present in the evidence below.
      required: true
      evidence:
        - results/restore-drill/qdrant-data-restore-*.json
        - results/restore-drill/restore-drill-run-*.json
        - results/restore-drill/sample-redis-run.json
      minPassRate: 1.0
      requireValidationPassed: true
    toolchain:
      required: true
      evidence:
        - results/toolchain/toolchain-*.json
        - results/toolchain/sample-summary.json
      requireNoMissingRequired: true
    egress:
      required: true
      evidence:
        - results/egress-governance/egress-governance-*.json
        - results/egress-governance/sample-summary.json
      maxErrors: 0
      minReferences: 1
    retention:
      required: true
      evidence:
        - results/retention/retention-*.json
        - results/retention/sample-summary.json
      maxErrors: 0
      minClasses: 5
    slo:
      required: true
      evidence:
        - results/slo/slo-*.json
        - results/slo/sample-summary.json
      maxErrors: 0
      minObjectives: 5
    quota:
      required: true
      evidence:
        - results/quota/quota-*.json
        - results/quota/sample-summary.json
      maxErrors: 0
      minPlans: 3
      minLabels: 4
    modelProvenance:
      required: true
      evidence:
        - results/model-provenance/model-provenance-*.json
        - results/model-provenance/sample-summary.json
      maxErrors: 0
      minArtifacts: 2
    supplyChain:
      required: true
      evidence:
        - results/supply-chain/supply-chain-summary-*.json
        - results/supply-chain/sample-summary.json
      requireZeroHighCriticalFindings: true
      requireChecksums: true
    evidencePack:
      required: true
      evidence:
        - results/evidence/evidence-*.json
        - results/evidence/sample-summary.json
      maxFailedControls: 0
