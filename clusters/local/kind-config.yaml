kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ai-platform-ops-lab
nodes:
  - role: control-plane
    image: kindest/node:v1.31.4
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true,platform.ai/node-pool=local"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
