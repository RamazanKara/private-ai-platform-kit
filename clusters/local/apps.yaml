apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cost-controls
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://opencost.github.io/opencost-helm-chart
    chart: opencost
    targetRevision: 1.41.0
    helm:
      releaseName: opencost
      values: |
        opencost:
          exporter:
            defaultClusterId: ai-platform-ops-lab-local
  destination:
    server: https://kubernetes.default.svc
    namespace: opencost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
