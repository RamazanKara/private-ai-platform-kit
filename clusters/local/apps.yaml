spec:
  project: default
  source:
    repoURL: https://github.com/RamazanKara/ai-platform-ops-lab.git
    targetRevision: HEAD
    path: backup/restore-drill
    directory:
      include: "k8s/*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: restore-drill
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
