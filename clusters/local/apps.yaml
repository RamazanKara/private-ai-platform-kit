apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: model-catalog
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RamazanKara/ai-platform-ops-lab.git
    targetRevision: HEAD
    path: model-catalog/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: inference
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
