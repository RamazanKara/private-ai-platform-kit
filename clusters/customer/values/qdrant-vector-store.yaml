replicaCount: 1

persistence:
  enabled: true
  size: 100Gi
  storageClassName: ""

resources:
  requests:
    cpu: "1"
    memory: 4Gi
  limits:
    cpu: "4"
    memory: 16Gi

podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: customer
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: rag-vector-customer

networkPolicy:
  enabled: true
  allowedIngressNamespaces:
    - rag
    - monitoring

serviceMonitor:
  enabled: true
