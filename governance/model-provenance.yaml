apiVersion: platform.ai/v1alpha1
kind: ModelProvenanceSet
metadata:
  name: private-ai-platform-kit-model-provenance
spec:
  description: Reviewed model artifact provenance for approved local and customer lab models.
  requiredEvidence:
    - sourceUri
    - immutableRef
    - digest
    - license
    - dataClassification
    - riskTier
    - promotionRequest
    - servingProfiles
  artifacts:
    - modelId: qwen3:0.6b
      status: approved
      source: ollama-library
      sourceUri: ollama://qwen3:0.6b
      immutableRef: ollama-library/qwen3:0.6b@sha256:a313de031f772801086dc1f1f074003658864953fd203b8d729ff08d5feba60a
      digest:
        algorithm: sha256
        value: a313de031f772801086dc1f1f074003658864953fd203b8d729ff08d5feba60a
        scope: source-reference
        verificationMode: source-reference-digest
        verificationCommand: ollama show qwen3:0.6b --modelfile
      license: apache-2.0
      dataClassification: internal
      riskTier: low
      promotionRequest: model-catalog/promotion-requests/qwen3-local-lab-approved.yaml
      catalogRef: model-catalog/models.yaml
      servingProfiles:
        - clusters/local/values/ollama.yaml
        - clusters/local/values/inference-gateway.yaml
      evidenceRefs:
        evalSummary: results/evals/sample-summary.md
        loadTestSummary: results/loadtest/sample-summary.md
        securityWorkflow: .github/workflows/ci.yml
      notes: Local demo model. Customers should replace source-reference digest with their registry or model-store artifact digest before production use.
    - modelId: Qwen/Qwen3-Coder-Next
      status: approved
      source: huggingface
      sourceUri: https://huggingface.co/Qwen/Qwen3-Coder-Next
      immutableRef: huggingface://Qwen/Qwen3-Coder-Next@sha256:71b3fd269cc80811780298417132e23cc6272e7fea40c36733c6caffa6e1ee06
      digest:
        algorithm: sha256
        value: 71b3fd269cc80811780298417132e23cc6272e7fea40c36733c6caffa6e1ee06
        scope: source-reference
        verificationMode: customer-model-store
        verificationCommand: huggingface-cli scan-cache --dir /models
      license: apache-2.0
      dataClassification: internal
      riskTier: medium
      promotionRequest: model-catalog/promotion-requests/qwen3-coder-customer-lab-approved.yaml
      catalogRef: model-catalog/models.yaml
      servingProfiles:
        - clusters/customer/values/vllm.yaml
        - clusters/customer/values/vllm-nvidia.yaml
        - clusters/customer/values/vllm-amd.yaml
        - clusters/customer/values/inference-gateway.yaml
      evidenceRefs:
        evalSummary: results/evals/sample-summary.md
        loadTestSummary: results/loadtest/sample-summary.md
        securityWorkflow: .github/workflows/ci.yml
      notes: Customer lab vLLM coding-agent model. Replace source-reference digest with the customer's pinned model-store artifact revision and checksum.
