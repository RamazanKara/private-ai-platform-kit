apiVersion: platform.ai/v1alpha1
kind: ModelProvenanceSet
metadata:
  name: ai-platform-ops-lab-model-provenance
spec:
  description: Reviewed model artifact provenance for approved local and customer lab models.
  requiredEvidence:
    - sourceUri
    - immutableRef
    - digest
    - license
    - dataClassification
    - riskTier
    - promotionRequest
    - servingProfiles
  artifacts:
    - modelId: qwen2.5:0.5b
      status: approved
      source: ollama-library
      sourceUri: ollama://qwen2.5:0.5b
      immutableRef: ollama-library/qwen2.5:0.5b@sha256:c6d5562dc5e8dcd394bb0458f66c39ea5af4a0c144819eaf06fb0dccecf94d53
      digest:
        algorithm: sha256
        value: c6d5562dc5e8dcd394bb0458f66c39ea5af4a0c144819eaf06fb0dccecf94d53
        scope: source-reference
        verificationMode: source-reference-digest
        verificationCommand: ollama show qwen2.5:0.5b --modelfile
      license: model-provider
      dataClassification: internal
      riskTier: low
      promotionRequest: model-catalog/promotion-requests/qwen-local-lab-approved.yaml
      catalogRef: model-catalog/models.yaml
      servingProfiles:
        - clusters/local/values/ollama.yaml
        - clusters/local/values/inference-gateway.yaml
      evidenceRefs:
        evalSummary: results/evals/sample-summary.md
        loadTestSummary: results/loadtest/sample-summary.md
        securityWorkflow: .github/workflows/ci.yml
      notes: Local demo model. Customers should replace source-reference digest with their registry or model-store artifact digest before production use.
    - modelId: TinyLlama/TinyLlama-1.1B-Chat-v1.0
      status: approved
      source: huggingface
      sourceUri: https://huggingface.co/TinyLlama/TinyLlama-1.1B-Chat-v1.0
      immutableRef: huggingface://TinyLlama/TinyLlama-1.1B-Chat-v1.0@sha256:ba9f781fb445e35fdc72cb7746bc762a799b504e7f8a4f1dc64eceb7d20c573b
      digest:
        algorithm: sha256
        value: ba9f781fb445e35fdc72cb7746bc762a799b504e7f8a4f1dc64eceb7d20c573b
        scope: source-reference
        verificationMode: customer-model-store
        verificationCommand: huggingface-cli scan-cache --dir /models
      license: apache-2.0
      dataClassification: internal
      riskTier: low
      promotionRequest: model-catalog/promotion-requests/tinyllama-customer-lab-approved.yaml
      catalogRef: model-catalog/models.yaml
      servingProfiles:
        - clusters/customer/values/vllm.yaml
        - clusters/customer/values/vllm-nvidia.yaml
        - clusters/customer/values/vllm-amd.yaml
        - clusters/customer/values/inference-gateway.yaml
      evidenceRefs:
        evalSummary: results/evals/sample-summary.md
        loadTestSummary: results/loadtest/sample-summary.md
        securityWorkflow: .github/workflows/ci.yml
      notes: Customer lab vLLM model. Replace source-reference digest with the customer's pinned model-store artifact revision and checksum.
