name: Feature request
description: Propose a platform capability or documentation improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, operator, or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, interface, or documentation change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - docs
        - helm
        - runtime
        - rag
        - tenant
        - security
        - governance
        - other
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Which commands or evidence should prove the feature works?
