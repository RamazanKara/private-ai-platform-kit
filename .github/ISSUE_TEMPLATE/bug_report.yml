name: Bug report
description: Report a reproducible problem in the platform kit.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: List exact commands, values profile, and relevant versions.
      placeholder: |
        make validate
        make local-up
        make sync
        make smoke RUNTIME_BACKEND=ollama
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker, Kubernetes, Helm, Python, runtime backend, GPU profile.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or evidence
      description: Redact secrets, raw prompts, customer data, and private context.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets, raw prompts, customer data, and private context.
          required: true
