name: Security fuzzing

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "41 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  security-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: src/inference-gateway/requirements.lock
      - run: pip install --require-hashes -r src/inference-gateway/requirements.lock
      - name: Mutate caller-controlled security parser inputs
        env:
          PYTHONPATH: src/inference-gateway
        run: python scripts/fuzz-security.py --iterations 50000
