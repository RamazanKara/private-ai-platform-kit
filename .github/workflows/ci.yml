name: CI

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"
          cache: false
      - name: Install validation tools
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/install-validation-tools.sh --bin-dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Validate
        run: make validate-full
      - name: Repo security scan (secret + misconfig)
        # Runs on every event including pull_request. Kept non-fatal on PRs so it
        # surfaces findings without blocking; remains gating on push/tag/schedule.
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: make repo-security-scan

  image:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Normalize image repository
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Compute image tags
        run: |
          set -euo pipefail
          # Immutable tags only: digest-pinned SHA tag for every build, plus the
          # immutable version tag on releases. Mutable :latest and :main tags are
          # intentionally omitted (the repo's Kyverno policy bans :latest, and
          # signing/attestation is digest-based).
          gateway_tags="ghcr.io/${IMAGE_REPO}/inference-gateway:${GITHUB_SHA}"
          rag_tags="ghcr.io/${IMAGE_REPO}/rag-service:${GITHUB_SHA}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            gateway_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/inference-gateway:${GITHUB_REF_NAME}"
            rag_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/rag-service:${GITHUB_REF_NAME}"
          fi
          {
            echo "GATEWAY_TAGS<<EOF"
            printf '%s\n' "$gateway_tags"
            echo "EOF"
            echo "RAG_TAGS<<EOF"
            printf '%s\n' "$rag_tags"
            echo "EOF"
          } >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and publish Helm charts
        if: github.ref_type == 'tag'
        env:
          HELM_EXPERIMENTAL_OCI: "1"
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin
          mkdir -p chart-packages
          for chart in deploy/charts/*; do
            [[ -f "${chart}/Chart.yaml" ]] || continue
            helm package "$chart" --destination chart-packages
          done
          # Record each pushed chart as <oci-ref>@<digest> so the signing step can
          # cosign-sign the immutable OCI artifact (mirrors digest-based image signing).
          : > chart-oci-refs.txt
          for package in chart-packages/*.tgz; do
            push_out="$(helm push "$package" "oci://ghcr.io/${IMAGE_REPO}/charts" 2>&1)"
            echo "${push_out}"
            ref="$(printf '%s\n' "${push_out}" | awk '/^Pushed:/ {print $2}')"
            digest="$(printf '%s\n' "${push_out}" | awk '/^Digest:/ {print $2}')"
            if [[ -n "${ref}" && -n "${digest}" ]]; then
              echo "${ref%:*}@${digest}" >> chart-oci-refs.txt
            fi
          done
      - name: Build and push gateway image
        id: build_gateway
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: src/inference-gateway
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.GATEWAY_TAGS }}
          build-args: |
            VCS_REF=${{ github.sha }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
      - name: Build and push RAG service image
        id: build_rag
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: src/rag-service
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.RAG_TAGS }}
          build-args: |
            VCS_REF=${{ github.sha }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway:${{ github.sha }}
          format: spdx-json
          output-file: inference-gateway.spdx.json
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ghcr.io/${{ env.IMAGE_REPO }}/rag-service:${{ github.sha }}
          format: spdx-json
          output-file: rag-service.spdx.json
      - name: Attest gateway build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-name: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway
          subject-digest: ${{ steps.build_gateway.outputs.digest }}
          push-to-registry: true
      - name: Attest RAG service build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-name: ghcr.io/${{ env.IMAGE_REPO }}/rag-service
          subject-digest: ${{ steps.build_rag.outputs.digest }}
          push-to-registry: true
      - name: Attest gateway SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-name: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway
          subject-digest: ${{ steps.build_gateway.outputs.digest }}
          sbom-path: inference-gateway.spdx.json
          push-to-registry: true
      - name: Attest RAG service SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-name: ghcr.io/${{ env.IMAGE_REPO }}/rag-service
          subject-digest: ${{ steps.build_rag.outputs.digest }}
          sbom-path: rag-service.spdx.json
          push-to-registry: true
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway:${{ github.sha }}
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_REPO }}/rag-service:${{ github.sha }}
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-rag-results.sarif
      - uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-inference-gateway
      - uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: trivy-rag-results.sarif
          category: trivy-rag-service
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
      - name: Sign image digests
        env:
          GATEWAY_IMAGE: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway
          GATEWAY_DIGEST: ${{ steps.build_gateway.outputs.digest }}
          RAG_IMAGE: ghcr.io/${{ env.IMAGE_REPO }}/rag-service
          RAG_DIGEST: ${{ steps.build_rag.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${GATEWAY_IMAGE}@${GATEWAY_DIGEST}"
          cosign sign --yes "${RAG_IMAGE}@${RAG_DIGEST}"
      - name: Sign Helm chart OCI artifacts
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          if [[ ! -s chart-oci-refs.txt ]]; then
            echo "No Helm chart OCI refs recorded; nothing to sign."
            exit 0
          fi
          while IFS= read -r chart_ref; do
            [[ -n "${chart_ref}" ]] || continue
            echo "Signing chart ${chart_ref}"
            cosign sign --yes "${chart_ref}"
          done < chart-oci-refs.txt
      - name: Generate supply-chain checksums
        run: |
          set -euo pipefail
          sha256sum \
            inference-gateway.spdx.json \
            rag-service.spdx.json \
            trivy-results.sarif \
            trivy-rag-results.sarif \
            > supply-chain-checksums.txt
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        with:
          name: supply-chain-evidence-${{ github.sha }}
          if-no-files-found: error
          path: |
            inference-gateway.spdx.json
            rag-service.spdx.json
            trivy-results.sarif
            trivy-rag-results.sarif
            supply-chain-checksums.txt
      - name: Attach supply-chain evidence to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_assets=(
            inference-gateway.spdx.json
            rag-service.spdx.json
            trivy-results.sarif
            trivy-rag-results.sarif
            supply-chain-checksums.txt
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${release_assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${release_assets[@]}" \
              --title "Private AI Platform Kit ${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag
          fi

  scheduled-proof:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"
          cache: false
      - name: Install validation tools
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/install-validation-tools.sh --bin-dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Generate strict proof evidence
        run: |
          set -euo pipefail
          make validate-full
          make toolchain-report TOOLCHAIN_PROFILE=strict
          make eval-local
          make loadtest-local
          make restore-drill
          make egress-report
          make retention-report
          make quota-report
          make model-provenance-report
          make image-scan
          make supply-chain-check
          make slo-report
          make evidence
          make release-gate-strict
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        if: always()
        with:
          name: scheduled-proof-evidence-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            .out/results/**/*.json
            .out/results/**/*.md
            .out/results/**/*.sarif
            .out/results/**/*.spdx.json
            .out/results/**/*.txt

  scorecard:
    runs-on: ubuntu-latest
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref_name == github.event.repository.default_branch
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false
      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: scorecard-results.sarif

  local-e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"
          cache: false
      - uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede  # v4.0.1
      - uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3  # v1.12.0
        with:
          install_only: true
      - name: Install validation tools
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/install-validation-tools.sh --bin-dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run local cluster E2E
        run: |
          set -euo pipefail
          LOCAL_KIND_NODE_IMAGE=kindest/node:v1.31.4 QUICKSTART_DIRECT_APPLY=1 QUICKSTART_SKIP_VALIDATE=1 make quickstart
          make sandbox-smoke
          make tenant-smoke
          make agent-smoke
          make evidence LIVE=1
      - name: Cleanup local cluster
        if: always()
        run: make local-down
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        if: always()
        with:
          name: local-e2e-evidence-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            .out/results/**/*.json
            .out/results/**/*.md
