name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - uses: azure/setup-helm@v5.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
          cache: false
      - name: Install validation tools
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/install-validation-tools.sh --bin-dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Validate
        run: make validate-full

  image:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Normalize image repository
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push gateway image
        uses: docker/build-push-action@v7.2.0
        with:
          context: services/inference-gateway
          push: true
          tags: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway:${{ github.sha }}
      - name: Build and push RAG service image
        uses: docker/build-push-action@v7.2.0
        with:
          context: services/rag-service
          push: true
          tags: ghcr.io/${{ env.IMAGE_REPO }}/rag-service:${{ github.sha }}
      - uses: anchore/sbom-action@v0.24.0
        with:
          image: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway:${{ github.sha }}
          format: spdx-json
          output-file: inference-gateway.spdx.json
      - uses: anchore/sbom-action@v0.24.0
        with:
          image: ghcr.io/${{ env.IMAGE_REPO }}/rag-service:${{ github.sha }}
          format: spdx-json
          output-file: rag-service.spdx.json
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_REPO }}/rag-service:${{ github.sha }}
          format: sarif
          output: trivy-rag-results.sarif
      - uses: github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-inference-gateway
      - uses: github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: trivy-rag-results.sarif
          category: trivy-rag-service
      - uses: sigstore/cosign-installer@v4.1.2
      - name: Sign image
        run: |
          cosign sign --yes ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway:${{ github.sha }}
          cosign sign --yes ghcr.io/${{ env.IMAGE_REPO }}/rag-service:${{ github.sha }}
