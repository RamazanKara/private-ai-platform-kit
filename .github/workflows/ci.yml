name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - uses: azure/setup-helm@v5.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
          cache: false
      - name: Install validation tools
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/install-validation-tools.sh --bin-dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Validate
        run: make validate-full

  image:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Normalize image repository
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Compute image tags
        run: |
          set -euo pipefail
          gateway_tags="ghcr.io/${IMAGE_REPO}/inference-gateway:${GITHUB_SHA}"
          rag_tags="ghcr.io/${IMAGE_REPO}/rag-service:${GITHUB_SHA}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            gateway_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/inference-gateway:${GITHUB_REF_NAME}"
            gateway_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/inference-gateway:latest"
            rag_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/rag-service:${GITHUB_REF_NAME}"
            rag_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/rag-service:latest"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            gateway_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/inference-gateway:main"
            rag_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/rag-service:main"
          fi
          {
            echo "GATEWAY_TAGS<<EOF"
            printf '%s\n' "$gateway_tags"
            echo "EOF"
            echo "RAG_TAGS<<EOF"
            printf '%s\n' "$rag_tags"
            echo "EOF"
          } >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push gateway image
        id: build_gateway
        uses: docker/build-push-action@v7.2.0
        with:
          context: services/inference-gateway
          push: true
          tags: ${{ env.GATEWAY_TAGS }}
      - name: Build and push RAG service image
        id: build_rag
        uses: docker/build-push-action@v7.2.0
        with:
          context: services/rag-service
          push: true
          tags: ${{ env.RAG_TAGS }}
      - uses: anchore/sbom-action@v0.24.0
        with:
          image: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway:${{ github.sha }}
          format: spdx-json
          output-file: inference-gateway.spdx.json
      - uses: anchore/sbom-action@v0.24.0
        with:
          image: ghcr.io/${{ env.IMAGE_REPO }}/rag-service:${{ github.sha }}
          format: spdx-json
          output-file: rag-service.spdx.json
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway:${{ github.sha }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_REPO }}/rag-service:${{ github.sha }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-rag-results.sarif
      - uses: github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-inference-gateway
      - uses: github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: trivy-rag-results.sarif
          category: trivy-rag-service
      - uses: sigstore/cosign-installer@v4.1.2
      - name: Sign image digests
        env:
          GATEWAY_IMAGE: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway
          GATEWAY_DIGEST: ${{ steps.build_gateway.outputs.digest }}
          RAG_IMAGE: ghcr.io/${{ env.IMAGE_REPO }}/rag-service
          RAG_DIGEST: ${{ steps.build_rag.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${GATEWAY_IMAGE}@${GATEWAY_DIGEST}"
          cosign sign --yes "${RAG_IMAGE}@${RAG_DIGEST}"
      - name: Generate supply-chain checksums
        run: |
          set -euo pipefail
          sha256sum \
            inference-gateway.spdx.json \
            rag-service.spdx.json \
            trivy-results.sarif \
            trivy-rag-results.sarif \
            > supply-chain-checksums.txt
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: supply-chain-evidence-${{ github.sha }}
          if-no-files-found: error
          path: |
            inference-gateway.spdx.json
            rag-service.spdx.json
            trivy-results.sarif
            trivy-rag-results.sarif
            supply-chain-checksums.txt
      - name: Attach supply-chain evidence to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_assets=(
            inference-gateway.spdx.json
            rag-service.spdx.json
            trivy-results.sarif
            trivy-rag-results.sarif
            supply-chain-checksums.txt
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${release_assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${release_assets[@]}" \
              --title "Private AI Platform Kit ${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag
          fi
