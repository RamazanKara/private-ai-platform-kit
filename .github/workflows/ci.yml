name: CI

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - uses: azure/setup-helm@v5.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
          cache: false
      - name: Install validation tools
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/install-validation-tools.sh --bin-dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Validate
        run: make validate-full

  image:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Normalize image repository
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Compute image tags
        run: |
          set -euo pipefail
          gateway_tags="ghcr.io/${IMAGE_REPO}/inference-gateway:${GITHUB_SHA}"
          rag_tags="ghcr.io/${IMAGE_REPO}/rag-service:${GITHUB_SHA}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            gateway_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/inference-gateway:${GITHUB_REF_NAME}"
            gateway_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/inference-gateway:latest"
            rag_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/rag-service:${GITHUB_REF_NAME}"
            rag_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/rag-service:latest"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            gateway_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/inference-gateway:main"
            rag_tags+=$'\n'"ghcr.io/${IMAGE_REPO}/rag-service:main"
          fi
          {
            echo "GATEWAY_TAGS<<EOF"
            printf '%s\n' "$gateway_tags"
            echo "EOF"
            echo "RAG_TAGS<<EOF"
            printf '%s\n' "$rag_tags"
            echo "EOF"
          } >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and publish Helm charts
        if: github.ref_type == 'tag'
        env:
          HELM_EXPERIMENTAL_OCI: "1"
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin
          mkdir -p chart-packages
          for chart in charts/*; do
            [[ -f "${chart}/Chart.yaml" ]] || continue
            helm package "$chart" --destination chart-packages
          done
          for package in chart-packages/*.tgz; do
            helm push "$package" "oci://ghcr.io/${IMAGE_REPO}/charts"
          done
      - name: Build and push gateway image
        id: build_gateway
        uses: docker/build-push-action@v7.2.0
        with:
          context: services/inference-gateway
          push: true
          tags: ${{ env.GATEWAY_TAGS }}
      - name: Build and push RAG service image
        id: build_rag
        uses: docker/build-push-action@v7.2.0
        with:
          context: services/rag-service
          push: true
          tags: ${{ env.RAG_TAGS }}
      - uses: anchore/sbom-action@v0.24.0
        with:
          image: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway:${{ github.sha }}
          format: spdx-json
          output-file: inference-gateway.spdx.json
      - uses: anchore/sbom-action@v0.24.0
        with:
          image: ghcr.io/${{ env.IMAGE_REPO }}/rag-service:${{ github.sha }}
          format: spdx-json
          output-file: rag-service.spdx.json
      - name: Attest gateway build provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway
          subject-digest: ${{ steps.build_gateway.outputs.digest }}
          push-to-registry: true
      - name: Attest RAG service build provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ghcr.io/${{ env.IMAGE_REPO }}/rag-service
          subject-digest: ${{ steps.build_rag.outputs.digest }}
          push-to-registry: true
      - name: Attest gateway SBOM
        uses: actions/attest@v4.1.1
        with:
          subject-name: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway
          subject-digest: ${{ steps.build_gateway.outputs.digest }}
          sbom-path: inference-gateway.spdx.json
          push-to-registry: true
      - name: Attest RAG service SBOM
        uses: actions/attest@v4.1.1
        with:
          subject-name: ghcr.io/${{ env.IMAGE_REPO }}/rag-service
          subject-digest: ${{ steps.build_rag.outputs.digest }}
          sbom-path: rag-service.spdx.json
          push-to-registry: true
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway:${{ github.sha }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_REPO }}/rag-service:${{ github.sha }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-rag-results.sarif
      - uses: github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-inference-gateway
      - uses: github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: trivy-rag-results.sarif
          category: trivy-rag-service
      - uses: sigstore/cosign-installer@v4.1.2
      - name: Sign image digests
        env:
          GATEWAY_IMAGE: ghcr.io/${{ env.IMAGE_REPO }}/inference-gateway
          GATEWAY_DIGEST: ${{ steps.build_gateway.outputs.digest }}
          RAG_IMAGE: ghcr.io/${{ env.IMAGE_REPO }}/rag-service
          RAG_DIGEST: ${{ steps.build_rag.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${GATEWAY_IMAGE}@${GATEWAY_DIGEST}"
          cosign sign --yes "${RAG_IMAGE}@${RAG_DIGEST}"
      - name: Generate supply-chain checksums
        run: |
          set -euo pipefail
          sha256sum \
            inference-gateway.spdx.json \
            rag-service.spdx.json \
            trivy-results.sarif \
            trivy-rag-results.sarif \
            > supply-chain-checksums.txt
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: supply-chain-evidence-${{ github.sha }}
          if-no-files-found: error
          path: |
            inference-gateway.spdx.json
            rag-service.spdx.json
            trivy-results.sarif
            trivy-rag-results.sarif
            supply-chain-checksums.txt
      - name: Attach supply-chain evidence to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_assets=(
            inference-gateway.spdx.json
            rag-service.spdx.json
            trivy-results.sarif
            trivy-rag-results.sarif
            supply-chain-checksums.txt
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${release_assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${release_assets[@]}" \
              --title "Private AI Platform Kit ${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag
          fi

  scheduled-proof:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - uses: azure/setup-helm@v5.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
          cache: false
      - name: Install validation tools
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/install-validation-tools.sh --bin-dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Generate strict proof evidence
        run: |
          set -euo pipefail
          make validate-full
          make toolchain-report TOOLCHAIN_PROFILE=strict
          make eval-local
          make loadtest-local
          make restore-drill
          make egress-report
          make retention-report
          make quota-report
          make model-provenance-report
          make image-scan
          make supply-chain-check
          make slo-report
          make evidence
          make release-gate-strict
      - uses: actions/upload-artifact@v5.0.0
        if: always()
        with:
          name: scheduled-proof-evidence-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            results/**/*.json
            results/**/*.md
            results/**/*.sarif
            results/**/*.spdx.json
            results/**/*.txt

  scorecard:
    runs-on: ubuntu-latest
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref_name == github.event.repository.default_branch
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false
      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: scorecard-results.sarif

  local-e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - uses: azure/setup-helm@v5.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
          cache: false
      - uses: azure/setup-kubectl@v4.0.1
      - uses: helm/kind-action@v1.12.0
        with:
          install_only: true
      - name: Install validation tools
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/install-validation-tools.sh --bin-dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run local cluster E2E
        run: |
          set -euo pipefail
          LOCAL_KIND_NODE_IMAGE=kindest/node:v1.31.4 QUICKSTART_DIRECT_APPLY=1 QUICKSTART_SKIP_VALIDATE=1 make quickstart
          make sandbox-smoke
          make tenant-smoke
          make agent-smoke
          make evidence LIVE=1
      - name: Cleanup local cluster
        if: always()
        run: make local-down
      - uses: actions/upload-artifact@v5.0.0
        if: always()
        with:
          name: local-e2e-evidence-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            results/**/*.json
            results/**/*.md
