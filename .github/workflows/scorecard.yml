name: OpenSSF Scorecard

on:
  workflow_dispatch:
  schedule:
    - cron: "41 4 * * 1"
  push:
    branches:
      - main

# Least privilege: read-only by default. The one job escalates only to what it needs.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read          # checkout
      actions: read           # Scorecard reads workflow-run metadata for its checks
      security-events: write  # upload the SARIF results
      id-token: write         # canonical scorecard-action permission; kept job-scoped, not workflow-wide
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: scorecard-results.sarif
