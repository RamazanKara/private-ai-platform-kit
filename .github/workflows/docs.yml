name: Docs site

# Builds the mkdocs-material site and deploys it to GitHub Pages.
# Requires repo Settings -> Pages -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "runbooks/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/docs-build.sh"
      - ".github/workflows/docs.yml"
  # The strict build must gate PRs too: without this, broken links/nav merge green
  # and only fail during the Pages deploy from main.
  pull_request:
    paths:
      - "docs/**"
      - "runbooks/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/docs-build.sh"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - run: pip install -r requirements-docs.txt
      # docs-build.sh build runs mkdocs --strict, so broken links or nav drift fail the deploy.
      - run: ./scripts/docs-build.sh build
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        if: github.event_name != 'pull_request'
        with:
          path: site

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
