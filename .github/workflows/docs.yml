name: Docs site

# Builds the mkdocs-material site and deploys it to GitHub Pages.
# Requires repo Settings -> Pages -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "runbooks/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/docs-build.sh"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - run: pip install -r requirements-docs.txt
      # docs-build.sh build runs mkdocs --strict, so broken links or nav drift fail the deploy.
      - run: ./scripts/docs-build.sh build
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
