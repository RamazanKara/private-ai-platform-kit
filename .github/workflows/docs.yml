name: Docs site

# Builds the mkdocs-material site and deploys it to GitHub Pages.
# Requires repo Settings -> Pages -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "docs/**"
      - "runbooks/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "requirements-docs.in"
      - "scripts/docs-build.sh"
      - ".github/workflows/docs.yml"
  # The strict build must gate PRs too: without this, broken links/nav merge green
  # and only fail during the Pages deploy from main.
  pull_request:
    paths:
      - "docs/**"
      - "runbooks/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "requirements-docs.in"
      - "scripts/docs-build.sh"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.event_name == 'pull_request' && github.ref || 'publish' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - run: pip install --require-hashes -r requirements-docs.txt
      # docs-build.sh build runs mkdocs --strict, so broken links or nav drift fail the deploy.
      - run: ./scripts/docs-build.sh build
      - name: Publish version into retained documentation tree
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          had_docs_branch=false
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            had_docs_branch=true
          fi
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            ./scripts/docs-build.sh mike deploy --branch gh-pages --push --update-aliases "$version" latest
            ./scripts/docs-build.sh mike set-default --branch gh-pages --push latest
          else
            ./scripts/docs-build.sh mike deploy --branch gh-pages --push --update-aliases development
            if [[ "$had_docs_branch" == "false" ]]; then
              ./scripts/docs-build.sh mike set-default --branch gh-pages --push development
            fi
          fi
          git fetch origin gh-pages
          rm -rf versioned-site
          mkdir -p versioned-site
          git archive origin/gh-pages | tar -x -C versioned-site
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        if: github.event_name != 'pull_request'
        with:
          path: versioned-site

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
