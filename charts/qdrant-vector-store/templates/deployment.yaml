apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qdrant-vector-store.fullname" . }}
  labels:
    {{- include "qdrant-vector-store.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "qdrant-vector-store.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qdrant-vector-store.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "qdrant-vector-store.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: qdrant
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: storage
              mountPath: {{ .Values.persistence.mountPath | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: storage
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "qdrant-vector-store.fullname" . }}-storage
          {{- else }}
          emptyDir: {}
          {{- end }}
