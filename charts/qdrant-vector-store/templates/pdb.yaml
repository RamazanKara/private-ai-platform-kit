{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "qdrant-vector-store.fullname" . }}
  labels:
    {{- include "qdrant-vector-store.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "qdrant-vector-store.selectorLabels" . | nindent 6 }}
{{- end }}
