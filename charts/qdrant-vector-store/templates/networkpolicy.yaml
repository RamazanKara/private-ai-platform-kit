{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "qdrant-vector-store.fullname" . }}
  labels:
    {{- include "qdrant-vector-store.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "qdrant-vector-store.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  # Egress is intentionally denied: Qdrant is a leaf store that makes no outbound
  # calls, so no egress rules (including DNS) are required.
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowedIngressNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
      ports:
        # Allow both the REST (http) and gRPC ports the Service exposes, scoped to
        # the same trusted namespaces, so gRPC clients are not silently blocked.
        - protocol: TCP
          port: http
        - protocol: TCP
          port: grpc
{{- end }}
