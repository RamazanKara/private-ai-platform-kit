replicaCount: 1

image:
  repository: vllm/vllm-openai
  tag: "v0.22.0"
  pullPolicy: IfNotPresent

model:
  name: Qwen/Qwen3-Coder-Next
  dtype: auto
  maxModelLen: "262144"

service:
  port: 8000

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

accelerator:
  enabled: true
  vendor: nvidia
  resourceName: nvidia.com/gpu
  count: 4
  runtimeClassName: ""
  nodeSelector:
    platform.ai/node-pool: gpu
    platform.ai/gpu-vendor: nvidia
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: "2"
    memory: 32Gi
  limits:
    cpu: "4"
    memory: 64Gi

podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: local
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: local-lab

serviceMonitor:
  enabled: true
  interval: 30s

externalSecrets:
  enabled: false
  huggingFaceTokenSecretName: hf-token
  huggingFaceTokenKey: token

extraEnv: []
extraArgs:
  - --tensor-parallel-size
  - "4"
  - --enable-auto-tool-choice
  - --tool-call-parser
  - qwen3_coder
