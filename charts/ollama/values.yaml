replicaCount: 1

image:
  repository: ollama/ollama
  # tag is kept as documentation; digest pins the multi-arch manifest list.
  tag: "0.24.0"
  digest: "sha256:a6149234667efc71d37766d61c1a16f24c33e4cd7a0bf4125c44a7e47e2419c4"
  pullPolicy: IfNotPresent

model:
  name: qwen3.5:0.8b
  pullOnStart: false

service:
  port: 11434

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

persistence:
  enabled: true
  size: 20Gi

topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

podDisruptionBudget:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: local
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: local-lab
