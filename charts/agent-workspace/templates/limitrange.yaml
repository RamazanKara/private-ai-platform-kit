apiVersion: v1
kind: LimitRange
metadata:
  name: agent-workspace-defaults
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agent-workspace.labels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: {{ .Values.limitRange.defaultRequestCpu | quote }}
        memory: {{ .Values.limitRange.defaultRequestMemory }}
      default:
        cpu: {{ .Values.limitRange.defaultCpu | quote }}
        memory: {{ .Values.limitRange.defaultMemory }}
