{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-workspace-runner
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agent-workspace.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  {{- if .Values.rbac.allowJobManagement }}
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-workspace-runner
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agent-workspace.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-workspace.serviceAccountName" . }}
    namespace: {{ .Values.namespace.name }}
  - kind: Group
    name: {{ .Values.rbac.viewerGroup }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: agent-workspace-runner
  apiGroup: rbac.authorization.k8s.io
{{- end }}
