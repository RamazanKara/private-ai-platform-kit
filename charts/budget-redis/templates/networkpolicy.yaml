{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "budget-redis.fullname" . }}-default-deny
  labels:
    {{- include "budget-redis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "budget-redis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "budget-redis.fullname" . }}-allow-gateway
  labels:
    {{- include "budget-redis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "budget-redis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowedIngressNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: redis
{{- end }}
