apiVersion: v1
kind: Service
metadata:
  name: {{ include "budget-redis.fullname" . }}
  labels:
    {{- include "budget-redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "budget-redis.selectorLabels" . | nindent 4 }}
