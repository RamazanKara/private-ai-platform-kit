replicaCount: 1
fullnameOverride: budget-redis

image:
  repository: redis
  # tag is kept as documentation; digest pins the multi-arch manifest list.
  tag: "8.0-alpine"
  digest: "sha256:5f61955be8ab2ccee9372b84ae4d4da2e2b156f87281e3f218544055e7ee04d4"
  pullPolicy: IfNotPresent

service:
  port: 6379

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

podLabels:
  platform.ai/cost-center: platform
  platform.ai/environment: local
  platform.ai/owner: platform-team
  platform.ai/sandbox-id: shared-budget

networkPolicy:
  enabled: true
  allowedIngressNamespaces:
    - inference

podDisruptionBudget:
  enabled: true
  minAvailable: 0
