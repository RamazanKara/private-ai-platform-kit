{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "inference-gateway.fullname" . }}-test-connection
  labels:
    {{- include "inference-gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: healthz
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      command: ["wget"]
      args:
        - "-q"
        - "-O-"
        - "http://{{ include "inference-gateway.fullname" . }}:{{ .Values.service.port }}/healthz"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
{{- end }}
