apiVersion: batch/v1
kind: CronJob
metadata:
  name: restore-drill
  namespace: restore-drill
  labels:
    app.kubernetes.io/name: restore-drill
    app.kubernetes.io/component: backup-validation
    app.kubernetes.io/part-of: ai-platform-ops-lab
    platform.ai/cost-center: platform
    platform.ai/environment: local
    platform.ai/owner: platform-team
    platform.ai/sandbox-id: local-lab
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: restore-drill
            app.kubernetes.io/component: backup-validation
            app.kubernetes.io/part-of: ai-platform-ops-lab
            platform.ai/cost-center: platform
            platform.ai/environment: local
            platform.ai/owner: platform-team
            platform.ai/sandbox-id: local-lab
        spec:
          serviceAccountName: restore-drill
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: restore-drill
              image: ghcr.io/ramazankara/restore-drill:v1.0.1
              imagePullPolicy: IfNotPresent
              args:
                - run
                - --runtime=kubernetes
                - --kube-namespace=restore-drill
                - --config=/config/drill.yaml
                - --format=json
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: config
                  mountPath: /config
                - name: reports
                  mountPath: /reports
                - name: fixtures
                  mountPath: /fixtures
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: config
              configMap:
                name: restore-drill-config
            - name: reports
              emptyDir: {}
            - name: fixtures
              configMap:
                name: restore-drill-config
                items:
                  - key: appendonly.aof
                    path: appendonly.aof
