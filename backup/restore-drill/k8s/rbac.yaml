apiVersion: v1
kind: ServiceAccount
metadata:
  name: restore-drill
  namespace: restore-drill
  labels:
    app.kubernetes.io/name: restore-drill
    app.kubernetes.io/part-of: ai-platform-ops-lab
    platform.ai/cost-center: platform
    platform.ai/environment: local
    platform.ai/owner: platform-team
    platform.ai/sandbox-id: local-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: restore-drill
  namespace: restore-drill
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: restore-drill
  namespace: restore-drill
subjects:
  - kind: ServiceAccount
    name: restore-drill
    namespace: restore-drill
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: restore-drill
