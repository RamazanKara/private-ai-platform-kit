apiVersion: v1
kind: Pod
metadata:
  name: privileged-pod
  labels:
    app.kubernetes.io/name: privileged-pod
    app.kubernetes.io/component: test
    app.kubernetes.io/part-of: private-ai-platform-kit
    platform.ai/cost-center: platform
    platform.ai/environment: test
    platform.ai/owner: platform-team
    platform.ai/sandbox-id: policy-test
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: privileged
      image: nginx:1.27.3
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
