apiVersion: v1
kind: Pod
metadata:
  name: latest-pod
  labels:
    app.kubernetes.io/name: latest-pod
    app.kubernetes.io/component: test
    app.kubernetes.io/part-of: ai-platform-ops-lab
    platform.ai/cost-center: platform
    platform.ai/environment: test
    platform.ai/owner: platform-team
    platform.ai/sandbox-id: policy-test
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: latest
      image: nginx:latest
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
