apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-model-catalog
  namespace: inference
  labels:
    app.kubernetes.io/name: ai-model-catalog
    app.kubernetes.io/part-of: private-ai-platform-kit
    platform.ai/cost-center: platform
    platform.ai/environment: local
    platform.ai/owner: platform-team
    platform.ai/sandbox-id: local-lab
data:
  models.yaml: |
    apiVersion: platform.ai/v1alpha1
    kind: ModelCatalog
    metadata:
      name: private-ai-platform-kit-models
    spec:
      models:
        - id: qwen3:0.6b
          runtime: ollama
          owner: platform-team
          status: approved
          stage: local-lab
          riskTier: low
          dataClassification: internal
          license: apache-2.0
          source: ollama-library
          accelerators:
            - cpu
          contextWindow: 32768
          maxPromptChars: 8192
          maxCompletionTokens: 1024
          promotionRequest: model-catalog/promotion-requests/qwen3-local-lab-approved.yaml
          notes: Current small Qwen3 smoke-test model for CPU-only workstations.
        - id: Qwen/Qwen3-Coder-Next
          runtime: vllm
          owner: platform-team
          status: approved
          stage: customer-lab
          riskTier: medium
          dataClassification: internal
          license: apache-2.0
          source: huggingface
          accelerators:
            - nvidia
            - amd
          contextWindow: 262144
          maxPromptChars: 131072
          maxCompletionTokens: 8192
          promotionRequest: model-catalog/promotion-requests/qwen3-coder-customer-lab-approved.yaml
          notes: Current Qwen3 Coder Next profile for customer GPU coding-agent clusters.
