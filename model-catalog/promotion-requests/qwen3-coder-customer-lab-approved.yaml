apiVersion: platform.ai/v1alpha1
kind: ModelPromotionRequest
metadata:
  name: qwen3-coder-customer-lab-approved
spec:
  modelId: Qwen/Qwen3-Coder-Next
  targetStatus: approved
  requestedBy: platform-team
  approvers:
    - model-governance-board
  businessJustification: Current OpenAI-compatible Qwen3 Coder Next profile for customer GPU coding-agent validation.
  runtime: vllm
  accelerators:
    - nvidia
    - amd
  rollout:
    environments:
      - customer
    allowedModelFiles:
      - clusters/customer/values/inference-gateway.yaml
    runtimeValueFiles:
      - clusters/customer/values/vllm.yaml
      - clusters/customer/values/vllm-nvidia.yaml
      - clusters/customer/values/vllm-amd.yaml
  evidence:
    evalSuite: evals/coding-agent-suite.yaml
    evalModelProxy: qwen3.5:0.8b
    evalProxyJustification: >-
      Qwen3-Coder-Next requires multi-GPU serving and cannot be run in CI; qwen3.5:0.8b
      is the CPU-runnable proxy exercised by the coding-agent eval suite. Re-run the suite
      against the real model on the customer GPU profile before production sign-off.
    evalSummary: results/evals/sample-summary.md
    loadTestSummary: results/loadtest/sample-summary.md
    securityWorkflow: .github/workflows/ci.yml
  conditions:
    promptLogging: redacted
    externalNetworkRequired: true
    requiresGpu: true
