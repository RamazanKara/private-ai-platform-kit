apiVersion: platform.ai/v1alpha1
kind: ModelPromotionRequest
metadata:
  name: qwen3.5-customer-lab-approved
spec:
  modelId: qwen3.5:0.8b
  targetStatus: approved
  requestedBy: platform-team
  approvers:
    - platform-team
  businessJustification: Higher-quality small Qwen3.5 reasoning model for the customer Ollama profile. It reasons slowly on CPU, so the local laptop profile uses the faster qwen2.5:0.5b instead.
  runtime: ollama
  accelerators:
    - cpu
  rollout:
    environments:
      - customer
    allowedModelFiles:
      - clusters/customer/values/inference-gateway.yaml
  evidence:
    evalSuite: evals/smoke-suite.yaml
    evalSummary: results/evals/sample-summary.md
    loadTestSummary: results/loadtest/sample-summary.md
    securityWorkflow: .github/workflows/ci.yml
  conditions:
    promptLogging: redacted
    externalNetworkRequired: false
    requiresGpu: false
